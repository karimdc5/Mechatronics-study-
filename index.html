          <button id="mtFwd" class="ctl go">▶ FWD (hold)</button>
          <button id="mtRev" class="ctl go">◀ REV (hold)</button>
          <button id="mtStop" class="ctl danger">⊘ STOP</button>
        </div>
        <div class="readout"><span id="mtState" style="color:var(--dim)">Stopped.</span></div>
      </div>
      <div id="mtVfd" hidden>
        <div class="ctrls">
          <div class="seg" id="mtPoles"><button data-p="2">2-pole</button><button data-p="4" class="on">4-pole</button><button data-p="6">6-pole</button><button data-p="8">8-pole</button></div>
          <label class="slider">Frequency <input id="mtFreq" type="range" min="0" max="90" value="60"><b id="mtFreqV">60 Hz</b></label>
        </div>
        <div class="meterpanel" id="mtPanel"></div>
      </div>
    </div>`;
    const svg=root.querySelector('svg');
    const ST={mode:'start',interlock:true,fwd:false,rev:false,fault:false,dir:0,poles:4,freq:60,seenAbove:false,seenBelow:false,seenFault:false};
    root.querySelectorAll('#mtMode button').forEach(b=>b.onclick=()=>{root.querySelectorAll('#mtMode button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
      ST.mode=b.dataset.m;root.querySelector('#mtStart').hidden=ST.mode!=='start';root.querySelector('#mtVfd').hidden=ST.mode!=='vfd';});
    root.querySelectorAll('#mtInterlock button').forEach(b=>b.onclick=()=>{root.querySelectorAll('#mtInterlock button').forEach(x=>x.classList.remove('on'));b.classList.add('on');ST.interlock=b.dataset.i==='on';});
    holdable(root.querySelector('#mtFwd'),()=>ST.fwd=true,()=>ST.fwd=false);
    holdable(root.querySelector('#mtRev'),()=>ST.rev=true,()=>ST.rev=false);
    root.querySelector('#mtStop').onclick=()=>{ST.fault=false;ST.fwd=false;ST.rev=false;};
    root.querySelectorAll('#mtPoles button').forEach(b=>b.onclick=()=>{root.querySelectorAll('#mtPoles button').forEach(x=>x.classList.remove('on'));b.classList.add('on');ST.poles=+b.dataset.p;evalVfd();});
    root.querySelector('#mtFreq').oninput=e=>{ST.freq=+e.target.value;root.querySelector('#mtFreqV').textContent=ST.freq+' Hz';evalVfd();};
    const dirTxt=root.querySelector('#mtDirTxt'), stEl=root.querySelector('#mtState');
    let raf;
    function tick(){
      if(ST.fault){ ST.dir=0; }
      else if(!ST.interlock&&ST.fwd&&ST.rev){ ST.fault=true; if(!ST.seenFault){ST.seenFault=true;api.award('mot_fault',15,'Triggered the FWD/REV short with the interlock off');} }
      else if(ST.interlock&&ST.fwd&&ST.rev){ /* interlock blocks the second command */ }
      else if(ST.fwd){ ST.dir=1; } else if(ST.rev){ ST.dir=-1; } else { ST.dir=0; }
      svg.getElementById('mtArrow').setAttribute('transform',ST.dir?`scale(${ST.dir},1)`:'');
      dirTxt.textContent=ST.fault?'⚠ FAULT — line-to-line short (FWD+REV both energized)':ST.dir>0?'FORWARD':ST.dir<0?'REVERSE':'STOPPED';
      dirTxt.style.fill=ST.fault?'var(--danger)':'var(--mot)';
      stEl.textContent=ST.fault?'Both contactors energized with no interlock — this is a direct short across the supply. Press STOP, then turn the interlock ON.'
        :(ST.interlock&&ST.fwd&&ST.rev)?'Interlock blocked the second command — only the direction that sealed in first can run.'
        :'Hold FWD or REV. With the interlock ON, the opposite direction can never energize at the same time.';
      raf=requestAnimationFrame(tick);
    }
    raf=requestAnimationFrame(tick);
    function evalVfd(){
      const Ns=120*ST.freq/ST.poles;
      const rpm=Ns*0.97;
      const base=60;
      const torquePct=ST.freq<=base?100:Math.max(20,Math.round(100*base/Math.max(1,ST.freq)));
      if(ST.freq>base&&!ST.seenAbove){ST.seenAbove=true;api.award('mot_above',15,'Drove the VFD above base frequency and saw torque fall off');}
      if(ST.freq>0&&ST.freq<base&&!ST.seenBelow){ST.seenBelow=true;api.award('mot_below',10,'Drove the VFD below base frequency');}
      root.querySelector('#mtPanel').innerHTML=
        `<div class="mrow"><span>Synchronous speed Ns = 120·f/P</span><b>${Ns.toFixed(0)} RPM</b></div>`
        +`<div class="mrow"><span>Actual RPM (with slip)</span><b>${rpm.toFixed(0)} RPM</b></div>`
        +`<div class="mrow"><span>Available torque</span><b>${torquePct}%</b></div>`
        +(ST.freq>base?`<div class="warnrow">Above base frequency (${base}Hz): voltage can't keep rising with frequency, so torque capability drops.</div>`:`<div class="okrow">At or below base frequency: volts/hertz ratio held constant — full torque available.</div>`);
    }
    evalVfd();
    return ()=>cancelAnimationFrame(raf);
  }
};

/* ============ 8. Microcontrollers — debounce + PWM ============ */
SIMS.sim_micro = {
  title:"Virtual Breadboard — Debounced Button → PWM", stack:"micro",
  desc:"Tap the button to step an output through PWM duty levels. Turn debounce OFF to see why a 'simple' button needs filtering before software can trust it.",
  mount(root,api){
    root.innerHTML=`
    <div class="simwrap">
      <div class="seg" id="mcDebounce"><button data-d="on" class="on">Debounce: ON</button><button data-d="off">Debounce: OFF</button></div>
      <svg viewBox="0 0 360 70" class="schematic accent-micro">
        <rect x="20" y="14" width="320" height="14" rx="4" fill="var(--panel2)"/>
        <rect id="mcBar" x="20" y="14" width="0" height="14" rx="4" fill="var(--micro)"/>
        <text x="20" y="46" class="svgtag">duty cycle</text>
        <g id="mcPulses" transform="translate(20,52)"></g>
      </svg>
      <div class="ctrls">
        <button id="mcTap" class="ctl go" style="font-size:16px;padding:16px 26px">👆 Press button</button>
      </div>
      <div class="readout"><span id="mcDuty">0% duty</span><span id="mcLog" style="color:var(--dim)">0 logical presses so far</span></div>
      <p class="sub" id="mcMsg" style="margin-top:6px"></p>
    </div>`;
    const svg=root.querySelector('svg');
    const LEVELS=[0,33,66,100];
    const ST={debounce:true,idx:0,presses:0,sawClean:false,sawBounceJump:false,sawCleanAfter:false};
    root.querySelectorAll('#mcDebounce button').forEach(b=>b.onclick=()=>{root.querySelectorAll('#mcDebounce button').forEach(x=>x.classList.remove('on'));b.classList.add('on');ST.debounce=b.dataset.d==='on';});
    function draw(){
      const duty=LEVELS[ST.idx];
      svg.getElementById('mcBar').setAttribute('width',320*duty/100);
      root.querySelector('#mcDuty').textContent=duty+'% duty';
      root.querySelector('#mcLog').textContent=ST.presses+' logical press'+(ST.presses===1?'':'es')+' so far';
      const g=svg.getElementById('mcPulses'); g.innerHTML='';
      const cellW=40; let cells='';
      for(let i=0;i<8;i++){
        const on=duty>0&&(i%4)<Math.round(duty/100*4);
        cells+=`<rect x="${i*cellW}" y="${on?0:6}" width="${cellW-4}" height="${on?12:6}" fill="${on?'var(--micro)':'var(--line)'}" opacity="${on?0.9:0.4}"/>`;
      }
      g.innerHTML=cells;
    }
    draw();
    root.querySelector('#mcTap').onclick=()=>{
      const msg=root.querySelector('#mcMsg');
      if(ST.debounce){
        ST.idx=(ST.idx+1)%LEVELS.length; ST.presses++;
        msg.textContent='Clean tap → exactly one step.';
        if(ST.idx===LEVELS.length-1&&!ST.sawClean){ST.sawClean=true;api.award('micro_step',15,'Stepped cleanly through every PWM level with debounce on');}
        if(ST.sawBounceJump&&!ST.sawCleanAfter){ST.sawCleanAfter=true;api.award('micro_fix',15,'Re-enabled debounce and confirmed a single clean step again');}
      } else {
        const bounces=2+Math.floor(Math.random()*3);
        for(let i=0;i<bounces;i++) ST.idx=(ST.idx+1)%LEVELS.length;
        ST.presses+=bounces;
        msg.textContent=`Bouncy tap → registered as ${bounces} presses from one physical tap (contact chatter).`;
        if(!ST.sawBounceJump){ST.sawBounceJump=true;api.award('micro_bounce',15,'Saw one physical tap register as multiple presses with debounce off');}
      }
      draw();
    };
    return ()=>{};
  }
};

/* ============ 9. Control Systems & PID — live step-response plotter ============ */
SIMS.sim_ctrl = {
  title:"Virtual Process — PID Step Response", stack:"ctrl",
  desc:"Tune Kp, Ki, Kd against a simulated first-order process and watch the live response plot — including the windup trap when the output saturates for too long.",
  mount(root,api){
    root.innerHTML=`
    <div class="simwrap">
      <svg viewBox="0 0 360 160" class="schematic accent-ctrl">
        <line x1="20" y1="140" x2="340" y2="140" stroke="var(--dim)" stroke-width="1.5"/>
        <line x1="20" y1="10" x2="20" y2="140" stroke="var(--dim)" stroke-width="1.5"/>
        <line id="ctrlSP" x1="20" y1="0" x2="340" y2="0" stroke="var(--ctrl)" stroke-dasharray="3 3" opacity=".6"/>
        <text id="ctrlSPTxt" x="324" y="0" class="svgtag" style="fill:var(--ctrl)">SP</text>
        <polyline id="ctrlLine" fill="none" stroke="var(--ctrl)" stroke-width="2"/>
        <text x="20" y="152" class="svgtag">0s</text><text x="320" y="152" class="svgtag">15s</text>
      </svg>
      <div class="ctrls">
        <label class="slider">Kp <input id="ctKp" type="range" min="0" max="10" step="0.1" value="1"><b id="ctKpV">1.0</b></label>
        <label class="slider">Ki <input id="ctKi" type="range" min="0" max="5" step="0.05" value="0"><b id="ctKiV">0.00</b></label>
        <label class="slider">Kd <input id="ctKd" type="range" min="0" max="3" step="0.05" value="0"><b id="ctKdV">0.00</b></label>
      </div>
      <div class="ctrls">
        <button id="ctRun" class="ctl go">▶ Run step response</button>
        <button id="ctReset" class="ctl">⏸ Reset</button>
        <button id="ctWindup" class="ctl danger">Force saturation (windup demo): OFF</button>
        <button id="ctAW" class="ctl">Anti-windup clamp: OFF</button>
      </div>
      <div class="readout"><span id="ctStat" style="color:var(--dim)">Set gains, then run the step response.</span></div>
    </div>`;
    const svg=root.querySelector('svg');
    const SP=100, DUR=15, dt=0.05;
    const spY=140-Math.max(0,Math.min(150,SP))/150*130;
    svg.getElementById('ctrlSP').setAttribute('y1',spY);svg.getElementById('ctrlSP').setAttribute('y2',spY);
    svg.getElementById('ctrlSPTxt').setAttribute('y',spY-4);
    const G={kp:1,ki:0,kd:0};
    const bind=(id,key,fmt)=>root.querySelector('#ct'+id).oninput=e=>{G[key]=+e.target.value;root.querySelector('#ct'+id+'V').textContent=fmt(G[key]);};
    bind('Kp','kp',v=>v.toFixed(1)); bind('Ki','ki',v=>v.toFixed(2)); bind('Kd','kd',v=>v.toFixed(2));
    const ST={running:false,t:0,pv:0,integral:0,prevErr:0,hist:[],windup:false,aw:false,seenDroop:false,seenZeroDroop:false,seenWindup:false,seenTuned:false};
    root.querySelector('#ctWindup').onclick=e=>{ST.windup=!ST.windup;e.target.textContent='Force saturation (windup demo): '+(ST.windup?'ON':'OFF');};
    root.querySelector('#ctAW').onclick=e=>{ST.aw=!ST.aw;e.target.textContent='Anti-windup clamp: '+(ST.aw?'ON':'OFF');};
    function reset(){ST.running=false;ST.t=0;ST.pv=0;ST.integral=0;ST.prevErr=0;ST.hist=[];svg.getElementById('ctrlLine').setAttribute('points','');root.querySelector('#ctStat').textContent='Set gains, then run the step response.';}
    root.querySelector('#ctReset').onclick=reset;
    root.querySelector('#ctRun').onclick=()=>{reset();ST.running=true;};
    function step(){
      const outMaxBase=150;
      const outMax=ST.windup?(ST.t<5?40:outMaxBase):outMaxBase;
      const err=SP-ST.pv;
      const raw=G.kp*err+G.ki*ST.integral+G.kd*(err-ST.prevErr)/dt;
      const out=Math.max(0,Math.min(outMax,raw));
      const saturated=out!==raw;
      if(!(ST.aw&&saturated)) ST.integral+=err*dt;
      ST.prevErr=err;
      ST.pv+=dt*(out-ST.pv)/2;
      ST.t+=dt;
      ST.hist.push([ST.t,ST.pv]);
    }
    function draw(){
      const x=t=>20+(t/DUR)*320, y=v=>140-Math.max(0,Math.min(150,v))/150*130;
      const pts=ST.hist.map(([t,v])=>`${x(t).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
      svg.getElementById('ctrlLine').setAttribute('points',pts);
    }
    function finish(){
      ST.running=false;
      const peak=ST.hist.length?Math.max(...ST.hist.map(p=>p[1])):0;
      const overshoot=Math.max(0,(peak-SP)/SP*100);
      const final=ST.hist.length?ST.hist[ST.hist.length-1][1]:0;
      const droop=Math.max(0,SP-final);
      const stat=root.querySelector('#ctStat');
      stat.innerHTML=`Peak ${peak.toFixed(0)} (${overshoot.toFixed(0)}% overshoot) · final ${final.toFixed(0)} (steady error ${droop.toFixed(0)})`;
      if(G.ki===0&&G.kd===0&&droop>3&&!ST.seenDroop){ST.seenDroop=true;api.award('ctrl_droop',15,'Confirmed P-only control leaves steady-state error');}
      if(G.ki>0&&droop<3&&!ST.seenZeroDroop){ST.seenZeroDroop=true;api.award('ctrl_izero',15,'Added Integral action and drove steady-state error to zero');}
      if(ST.windup&&overshoot>30&&!ST.seenWindup){ST.seenWindup=true;api.award('ctrl_windup',20,'Observed integral windup overshoot after a forced saturation');}
      if(overshoot<10&&droop<3&&!ST.seenTuned){ST.seenTuned=true;api.award('ctrl_tuned',20,'Tuned a response under 10% overshoot with no steady-state error');}
    }
    let raf,acc=0,last=performance.now();
    function tick(now){
      const frameDt=Math.min(.05,(now-last)/1000); last=now;
      if(ST.running){
        acc+=frameDt;
        while(acc>=dt&&ST.running){ acc-=dt; step(); if(ST.t>=DUR) finish(); }
        draw();
      }
      raf=requestAnimationFrame(tick);
    }
    raf=requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(raf);
  }
};

</script>
<script>
/* Mechatronics Stack Mastery v3 — app shell + 100% local AI tutor */

/* ---------- state ---------- */
const DEFAULT = { xp:0, badges:[], streak:0, lastDay:null,
  quizBest:{}, quizDone:{}, labSteps:{}, labDone:{}, simAwards:{}, simSeen:{}, scenDone:{}, courseDone:{},
  examBest:{}, examDone:{}, studentName:'', classCode:'' };
let ST = (()=>{ try{ return Object.assign({},DEFAULT,JSON.parse(localStorage.getItem('msm_state')||'{}')); }catch(e){ return {...DEFAULT}; } })();
function save(){ localStorage.setItem('msm_state',JSON.stringify(ST)); }
function today(){ return new Date().toISOString().slice(0,10); }
function bumpStreak(){ const t=today(); if(ST.lastDay===t)return; const y=new Date(Date.now()-864e5).toISOString().slice(0,10); ST.streak=(ST.lastDay===y)?ST.streak+1:1; ST.lastDay=t; save(); }
function level(){ return Math.floor(ST.xp/150)+1; }
function levelPct(){ return (ST.xp%150)/150*100; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2200); }
function addXP(n,label){ ST.xp+=n; bumpStreak(); save(); renderHeader(); toast(`+${n} XP${label?' · '+label:''}`); checkBadges(); }
function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

/* ---------- badges ---------- */
const BADGES=[
 {id:'spark',ico:'⚡',name:'First Spark',test:()=>ST.xp>0},
 {id:'air',ico:'💨',name:'Air Bender',test:()=>(ST.quizBest.q_pneu||0)>=80},
 {id:'oil',ico:'🛢️',name:'Oil Pressure',test:()=>(ST.quizBest.q_hyd||0)>=80},
 {id:'relay',ico:'🎛️',name:'Relay Wrangler',test:()=>(ST.quizBest.q_relay||0)>=80},
 {id:'wave',ico:'🌊',name:'Wave Rider',test:()=>(ST.quizBest.q_acdc||0)>=80},
 {id:'rookie',ico:'🌱',name:'Foundations',test:()=>['qb_pneu','qb_hyd','qb_elec','qb_acdc','qb_plc','qb_sens','qb_mot','qb_micro','qb_ctrl'].every(q=>(ST.quizBest[q]||0)>=80)},
 {id:'logic',ico:'🔌',name:'Logic Builder',test:()=>(ST.quizBest.q_plc||0)>=80},
 {id:'sensor',ico:'📡',name:'Signal Reader',test:()=>(ST.quizBest.q_sens||0)>=80},
 {id:'torque',ico:'🌀',name:'Torque Master',test:()=>(ST.quizBest.q_mot||0)>=80},
 {id:'embedded',ico:'🔬',name:'Embedded Builder',test:()=>(ST.quizBest.q_micro||0)>=80},
 {id:'tuner',ico:'🎚️',name:'Loop Tuner',test:()=>(ST.quizBest.q_ctrl||0)>=80},
 {id:'fixer',ico:'🔧',name:'Troubleshooter',test:()=>SCENARIOS.every(s=>ST.scenDone[s.id])},
 {id:'labrat',ico:'🥼',name:'Lab Rat',test:()=>LABS.every(l=>ST.labDone[l.id])},
 {id:'simulant',ico:'🕹️',name:'Simulant',test:()=>Object.keys(SIMS).every(k=>ST.simSeen[k])},
 {id:'scholar',ico:'📖',name:'Scholar',test:()=>UNITS.every(u=>Object.keys(ST.courseDone[u.id]||{}).length===u.lessons.length)},
 {id:'streak3',ico:'🔥',name:'3-Day Streak',test:()=>ST.streak>=3},
 {id:'centurion',ico:'🏆',name:'Level 5',test:()=>level()>=5},
 {id:'graduate',ico:'🎓',name:'Graduate',test:()=>Object.keys(STACKS).every(sid=>(ST.examBest['ex_'+sid]||0)>=EXAM_PASS)&&(ST.examBest.ex_final||0)>=EXAM_PASS},
];
function checkBadges(){ BADGES.forEach(b=>{ if(!ST.badges.includes(b.id)&&b.test()){ ST.badges.push(b.id); save(); setTimeout(()=>toast(`${b.ico} Badge: ${b.name}`),900); renderHeader(); }}); }

/* ---------- mastery ---------- */
function mastery(stack){
  const qs=QUIZZES.filter(q=>q.stack===stack);
  const quiz=qs.length?qs.reduce((a,q)=>a+(ST.quizBest[q.id]||0),0)/qs.length/100:0;
  const labs=LABS.filter(l=>l.stack===stack);
  const lab=labs.length?labs.filter(l=>ST.labDone[l.id]).length/labs.length:0;
  const sims=Object.entries(SIMS).filter(([,v])=>v.stack===stack);
  const sim=sims.length?sims.filter(([k])=>ST.simSeen[k]).length/sims.length:0;
  return Math.round((quiz*0.6+lab*0.25+sim*0.15)*100);
}

/* ---------- nav ---------- */
function renderHeader(){
  document.getElementById('hdr').innerHTML=`
    <span class="brand">MECH·STACKS</span><span class="spacer"></span>
    <span class="pill gold">◆ ${ST.xp} XP · L${level()}</span>
    ${ST.streak>1?`<span class="pill fire">🔥 ${ST.streak}</span>`:''}
    <button class="aibtn" onclick="openChat()">⚡ AI</button>`;
}
const TABS=[
 ['home','Home','M3 11l9-8 9 8M5 9v11h14V9'],
 ['course','Course','M12 6c-2-1.5-5-2-8-1v13c3-1 6-.5 8 1c2-1.5 5-2 8-1V5c-3-1-6-.5-8 1zM12 6v13'],
 ['sym','Symbols','M4 7h6v6H4zM14 7h6M14 11h6M4 17h16'],
 ['sim','Sim','M7 8l-4 4 4 4M17 8l4 4-4 4M13 5l-2 14'],
 ['labs','Labs','M9 3h6M10 3v6l-5 9a2 2 0 002 3h10a2 2 0 002-3l-5-9V3'],
 ['quiz','Train','M9 9a3 3 0 115 2c-.7.7-2 1-2 2.5M12 17.5v.5'],
];
let route='home', cleanup=null;
function nav(r){
  if(cleanup){cleanup();cleanup=null;}
  route=r; window.scrollTo(0,0);

  if(base==='home') renderHome(m);
  else if(base==='course') arg?renderCourseUnit(m,arg):renderCourseList(m);
  else if(base==='sym') renderSymbols(m);

  else if(base==='labs') arg?renderLab(m,arg):renderLabList(m);
  else if(base==='quiz') arg?(arg.startsWith('ts_')?renderScenario(m,arg):renderQuiz(m,arg)):renderTrain(m);
  else if(base==='exam') renderExam(m,arg);
  else if(base==='cert') renderCertificate(m);
  else if(base==='teacher') renderTeacher(m);
}

/* ---------- COURSE ---------- */
function renderCourseList(m){
  m.innerHTML=`<h2 style="margin-top:4px">Course</h2>
    <p class="sub">Theory readings for each unit — read these before the symbols, sim, and lab for that stack.</p>`+
    UNITS.map(u=>{
      const s=STACKS[u.id], done=Object.keys(ST.courseDone[u.id]||{}).length, total=u.lessons.length;

}
function renderCourseUnit(m,id){

    <div class="eyebrow" style="color:${s.color}">${s.tag}</div>

    <div class="card"><b>Learning objectives</b><ul style="margin:8px 0 0;padding-left:18px">
      ${u.objectives.map(o=>`<li class="sub" style="margin:4px 0">${o}</li>`).join('')}</ul></div>
    ${u.lessons.map((l,i)=>`
      <div class="card">
        <div class="cardrow"><div class="grow"><b>${i+1}. ${l.title}</b></div>

function downloadFile(filename,content,mime){
  const blob=new Blob([content],{type:mime});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function exportProgress(){
  const sids=Object.keys(STACKS);
  const examScores={}; sids.forEach(sid=>examScores[sid]=ST.examBest['ex_'+sid]||0);
  const unitsPassed=sids.filter(sid=>(ST.examBest['ex_'+sid]||0)>=EXAM_PASS).length;
  const finalScore=ST.examBest.ex_final||0, finalPassed=finalScore>=EXAM_PASS;
  const data={
    app:'msm', version:1, exportedAt:new Date().toISOString(),
    studentName:ST.studentName||'(unnamed)', classCode:ST.classCode||'',
    xp:ST.xp, level:level(), badges:ST.badges.length,
    examScores, unitsPassed, unitsTotal:sids.length,
    finalScore, finalPassed, certificateEligible:unitsPassed===sids.length&&finalPassed
  };
  const safe=(ST.studentName||'student').replace(/[^a-z0-9]+/gi,'_').toLowerCase();

  toast('Progress exported');
}

function loadRoster(){ try{ return JSON.parse(localStorage.getItem('msm_roster')||'[]'); }catch(e){ return []; } }
function saveRoster(r){ localStorage.setItem('msm_roster',JSON.stringify(r)); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function renderTeacher(m){
  const roster=loadRoster();
  const rows=roster.map(s=>`<tr>
    <td>${escapeHtml(s.studentName)}</td>
    <td>${escapeHtml(s.classCode||'—')}</td>
    <td class="num">${s.xp}</td>
    <td class="num">${s.unitsPassed}/${s.unitsTotal}</td>
    <td class="num">${s.finalScore}%</td>
    <td class="num">${s.certificateEligible?'✓':'—'}</td>
  </tr>`).join('');
  m.innerHTML=`<button class="backbtn" onclick="nav('home')">‹ Home</button>
    <h2>Teacher Dashboard</h2>
    <p class="sub">Import each student's exported progress JSON to build a class roster. Everything stays in this browser — nothing is uploaded anywhere.</p>
    <label class="filebtn" for="rosterfile">📂 Import student progress file(s)</label>
    <input type="file" id="rosterfile" accept=".json" multiple style="display:none">
    ${roster.length?`
    <table class="rostertable"><thead><tr>
      <th>Name</th><th>Class</th><th>XP</th><th>Units</th><th>Final</th><th>Cert</th>
    </tr></thead><tbody>${rows}</tbody></table>
    <div class="ctrls" style="margin-top:14px">
      <button class="ctl go" id="csvbtn">⬇ Export CSV</button>
      <button class="ctl danger" id="clearbtn">Clear roster</button>
    </div>`:`<p class="sub" style="margin-top:14px">No students imported yet.</p>`}`;
  m.querySelector('#rosterfile').onchange=async e=>{
    const files=[...e.target.files];
    let added=0;
    for(const f of files){
      try{
        const data=JSON.parse(await f.text());
        if(data.app!=='msm'||!data.studentName)continue;
        const list=loadRoster();
        const idx=list.findIndex(s=>s.studentName.toLowerCase()===data.studentName.toLowerCase()&&(s.classCode||'')===(data.classCode||''));
        if(idx>=0)list[idx]=data; else list.push(data);
        saveRoster(list);
        added++;
      }catch(err){}
    }
    toast(added?`Imported ${added} file${added>1?'s':''}`:'No valid progress files found');
    renderTeacher(m);
  };
  if(roster.length){
    m.querySelector('#csvbtn').onclick=()=>{
      const header=['Name','Class Code','XP','Level','Units Passed','Units Total','Final Exam %','Final Passed','Certificate Eligible','Exported At'];
      const lines=[header.join(',')];
      roster.forEach(s=>{
        lines.push([s.studentName,s.classCode||'',s.xp,s.level,s.unitsPassed,s.unitsTotal,s.finalScore,s.finalPassed,s.certificateEligible,s.exportedAt]
          .map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
      });
      downloadFile('class-roster.csv', lines.join('\n'), 'text/csv');
    };
    m.querySelector('#clearbtn').onclick=()=>{
      if(confirm('Clear the entire imported roster? This cannot be undone.')){ saveRoster([]); renderTeacher(m); }
    };
  }
}

function renderQuiz(m,id){
  const qz=QUIZZES.find(x=>x.id===id); if(!qz){nav('quiz');return;}
  ST.quizDone[id]=ST.quizDone[id]||{};
  let i=0, score=0;
  function q(){
    if(i>=qz.questions.length)return done();
    const Q=qz.questions[i];
    m.innerHTML=`<button class="backbtn" onclick="nav('quiz')">‹ Train</button>
      <div class="qprog">${qz.title} · ${i+1}/${qz.questions.length}</div>
      <h3>${Q.q}</h3>
      ${Q.a.map((a,j)=>`<button class="qopt" data-j="${j}">${a}</button>`).join('')}
      <div id="exp"></div>`;
    let answered=false;
    m.querySelectorAll('.qopt').forEach(b=>b.onclick=()=>{
      if(answered)return; answered=true;
      const j=+b.dataset.j, ok=j===Q.c;
      if(ok){score++;b.classList.add('correct');if(!ST.quizDone[id][i]){ST.quizDone[id][i]=true;save();addXP(10,'Correct');}}
      else{b.classList.add('wrong');m.querySelectorAll('.qopt')[Q.c].classList.add('correct');}
      m.querySelector('#exp').innerHTML=`<div class="qexp">${Q.x}</div>
        <button class="btn primary block" style="margin-top:12px" id="nx">${i+1<qz.questions.length?'Next ›':'Finish'}</button>`;
      m.querySelector('#nx').onclick=()=>{i++;q();window.scrollTo(0,0);};
    });

/* ================================================================
   LOCAL AI TUTOR — zero cost, no API key
   Engine A "Instant": rule-based + retrieval over built-in content and
                       uploaded documents. Always works, fully offline.
   Engine B "Local model": WebLLM on-device LLM (WebGPU). Optional
                       download (~350–900 MB once, cached by browser).
   RAG: PDFs (pdf.js) / PPTX (JSZip) / TXT parsed in-browser, chunked,
        stored in IndexedDB, retrieved by keyword scoring per question.
   ================================================================ */

/* ---------- IndexedDB for documents ---------- */
const DB={
  open(){ return new Promise((res,rej)=>{ const r=indexedDB.open('msm_docs',1);
    r.onupgradeneeded=()=>r.result.createObjectStore('docs',{keyPath:'id'});
    r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); },
  async all(){ const db=await this.open(); return new Promise((res,rej)=>{ const r=db.transaction('docs').objectStore('docs').getAll(); r.onsuccess=()=>res(r.result||[]); r.onerror=()=>rej(r.error); }); },
  async put(doc){ const db=await this.open(); return new Promise((res,rej)=>{ const r=db.transaction('docs','readwrite').objectStore('docs').put(doc); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); },
  async del(id){ const db=await this.open(); return new Promise((res,rej)=>{ const r=db.transaction('docs','readwrite').objectStore('docs').delete(id); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); },
};
let userDocs=[];   // cached in memory: [{id,name,chunks:[{title,text}]}]
async function loadDocs(){ try{ userDocs=await DB.all(); }catch(e){ userDocs=[]; } }

/* ---------- built-in knowledge chunks ---------- */
let BUILTIN=null;
function builtinChunks(){
  if(BUILTIN) return BUILTIN;
  const c=[];
  SYMBOLS.forEach(s=>c.push({src:'built-in',title:s.name,text:`${s.what} Common mistakes: ${s.mistakes.join(' ')}`}));
  LABS.forEach(l=>{

    c.push({src:'built-in',title:l.title+' — safety',text:l.safety.join(' ')});
  });
  QUIZZES.forEach(q=>q.questions.forEach(Q=>c.push({src:'built-in',title:q.title,text:`Q: ${Q.q} Answer: ${Q.a[Q.c]}. ${Q.x}`})));
  SCENARIOS.forEach(s=>c.push({src:'built-in',title:'Troubleshooting: '+s.title,text:`${s.setup} ${s.q} Answer: ${s.a[s.c]}. ${s.x}`}));
  REFERENCE.forEach(r=>c.push({src:'built-in',title:r.h,text:r.items.join('. ')}));
  BUILTIN=c; return c;

/* ---------- retrieval ---------- */
const STOP=new Set(['the','and','for','with','that','this','what','when','why','how','does','can','will','would','should','about','from','your','have','has','was','were','are','is','of','to','in','on','a','an','it','its','my','me','i','you','do','at','by','or','be','as']);
function terms(q){ return q.toLowerCase().replace(/[^a-z0-9\s\-]/g,' ').split(/\s+/).filter(w=>w.length>2&&!STOP.has(w)); }
function scoreChunk(qt,chunk){
  const hay=(chunk.title+' '+chunk.text).toLowerCase();
  let s=0;
  qt.forEach(t=>{ if(chunk.title.toLowerCase().includes(t)) s+=3;
    const m=hay.split(t).length-1; s+=Math.min(m,3); });
  return s;
}
function retrieve(q,n=3){
  const qt=terms(q); if(!qt.length) return [];
  const all=[...builtinChunks(),...userDocs.flatMap(d=>d.chunks.map(c=>({...c,src:d.name})))];
  return all.map(c=>({c,s:scoreChunk(qt,c)})).filter(x=>x.s>1)
    .sort((a,b)=>b.s-a.s).slice(0,n).map(x=>x.c);
}

/* ---------- rule-based fast answers ---------- */
const RULES=[
 {re:/(δp|delta\s*p|pressure\s*drop)/i, a:"**ΔP across the flow-control valve** = |Gauge A − Gauge B|.\nExample: Gauge A = 180 psi, Gauge B = 290 psi → ΔP = 110 psi.\nIt's the pressure 'spent' pushing oil/air through the restriction — bigger opening, smaller ΔP."},
 {re:/p\s*=\s*v|watt|lamp\s*power|power\s*calc/i, a:"**Power: P = V × I** (volts × amps = watts).\nFrom the AC/DC lab: BYPASS ≈ 22.8 V × 0.95 A ≈ 21.7 W. CAP ≈ 13.4 V × 0.56 A ≈ 7.5 W.\nAlways multiply V and I from the SAME selector position."},
 {re:/turns?\s*ratio|transformer\s*(ratio|formula|equation)/i, a:"**Transformer ratio: Vs/Vp = Ns/Np** — voltage scales with turns.\nCurrent scales inversely (Ip/Is = Ns/Np) because power is conserved: Vp·Ip ≈ Vs·Is.\nThe T7017A is ≈1:1 — an ISOLATION transformer: same ~24 VAC out, but galvanically separated."},
 {re:/xc|capacitive\s*reactance|reactance/i, a:"**Capacitive reactance: Xc = 1/(2πfC)** — the capacitor's AC opposition in ohms.\nInductive: XL = 2πfL.\nIn the CAP position, Xc in series with the lamp divides the 24 V, so the lamp gets less voltage → dimmer, less current."},
 {re:/psi\s*(to|→|->)?\s*kpa|kpa\s*conver|convert.*psi/i, a:"**psi → kPa: multiply by 6.895.**\n30 psi ≈ 207 kPa (pneumatics setpoint) · 300 psi ≈ 2070 kPa (hydraulics setpoint)."},
 {re:/setpoint|what\s*pressure.*(set|lab)|regulator\s*setting/i, a:"**Lab setpoints:**\n• Pneumatics: Gauge A = 30 psi / 207 kPa\n• Hydraulics: Gauge S = 300 psi / 2070 kPa (relief starts at MINIMUM)\n• Relay lab: 1TR = 1 second\n• AC/DC: 24 VAC source, ≈1:1 isolation transformer"},
 {re:/meter[\s-]*out/i, a:"**Meter-out flow control** restricts the EXHAUST side of the cylinder, not the supply.\n• Back pressure builds on the leaving side (that's what Gauge B shows)\n• Controls the metered stroke only — the check valve frees the reverse stroke\n• Resists runaway loads (the trapped fluid acts as a brake)\nResult: smooth controlled extension + rapid retraction."},
 {re:/seal[\s-]*in|holding\s*circuit|stay.*energized|memory\s*circuit/i, a:"**Seal-in circuit** = the relay's own NO contact (1CRA) wired in parallel with the START button.\nPress START → 1CR energizes → 1CRA closes around the button → release START and the relay holds itself.\nBoolean: 1CR = STOP AND (START OR 1CRA). It's 1-bit memory in hardware."},
];

/* ---------- Instant engine ---------- */
function instantAnswer(q){
  for(const r of RULES){ if(r.re.test(q)){
    const extra=retrieve(q,1);
    return r.a+(extra.length?`\n\n———\n📌 **${extra[0].title}** (${extra[0].src})\n${extra[0].text.slice(0,260)}…`:'');
  }}
  const hits=retrieve(q,3);
  if(!hits.length) return "I couldn't match that to anything in the lab content or your uploaded documents.\n\nTry: a symbol name (\"flow control valve\"), a concept (\"meter-out\", \"seal-in\", \"isolation transformer\"), a formula (\"ΔP\", \"P = V×I\"), or a fault (\"cylinder won't extend\").\n\nOr switch to the **Local model** engine for free-form answers.";
  return hits.map(h=>`📌 **${h.title}**${h.src!=='built-in'?` _(from ${h.src})_`:''}\n${h.text}`).join('\n\n');
}

async function llmAnswer(q,history){
  const rag=retrieve(q,3).map(c=>`[${c.title}] ${c.text}`).join('\n').slice(0,2400);
  const msgs=[{role:'system',content:llmSystemPrompt(rag)},...history.slice(-6),{role:'user',content:q}];
  const out=await llm.engine.chat.completions.create({messages:msgs,max_tokens:400,temperature:0.4});
  return out.choices[0].message.content;

/* ---------- document upload & parsing ---------- */
function loadScript(src){ return new Promise((res,rej)=>{ if(document.querySelector(`script[src="${src}"]`))return res();
  const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=()=>rej(new Error('Failed to load '+src)); document.head.appendChild(s); }); }

function chunkText(text,title){
  const clean=text.replace(/\s+/g,' ').trim(); const chunks=[];
  for(let i=0;i<clean.length;i+=550){
    let end=Math.min(i+650,clean.length);
    const dot=clean.lastIndexOf('. ',end); if(dot>i+300) end=dot+1;
    chunks.push({title:`${title} (part ${chunks.length+1})`,text:clean.slice(i,end)});
    i=end-550;
    if(chunks.length>200)break;
  }
  return chunks;
}
async function parseFile(file){
  const name=file.name, lower=name.toLowerCase();
  if(lower.endsWith('.txt')||lower.endsWith('.md')){
    return chunkText(await file.text(),name);
  }
  if(lower.endsWith('.pdf')){
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
    let text='';
    for(let p=1;p<=Math.min(pdf.numPages,60);p++){
      const pg=await pdf.getPage(p); const tc=await pg.getTextContent();
      text+=tc.items.map(i=>i.str).join(' ')+'\n';
    }
    if(text.trim().length<40) throw new Error('No selectable text found — this PDF looks like a scan/photo. Export a text-based PDF or paste the text into a .txt file.');
    return chunkText(text,name);
  }
  if(lower.endsWith('.pptx')){
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
    const zip=await JSZip.loadAsync(await file.arrayBuffer());
    const slides=Object.keys(zip.files).filter(f=>/^ppt\/slides\/slide\d+\.xml$/.test(f)).sort();
    let text='';
    for(const f of slides){
      const xml=await zip.files[f].async('string');
      const matches=[...xml.matchAll(/<a:t>([^<]*)<\/a:t>/g)].map(m=>m[1]).join(' ');
      text+=matches+'\n';
    }
    if(text.trim().length<20) throw new Error('No text found in this PPTX.');
    return chunkText(text,name);
  }
  throw new Error('Supported: .pdf, .pptx, .txt, .md  (old .ppt and scanned PDFs are not — re-export as PDF with text or PPTX)');
}
async function handleUpload(input){
  const files=[...input.files]; input.value='';
  for(const f of files){
    toast('Parsing '+f.name+'…');
    try{
      const chunks=await parseFile(f);
      const doc={id:f.name+'_'+Date.now(),name:f.name,chunks,added:Date.now()};
      await DB.put(doc); userDocs.push(doc);
      toast(`✓ ${f.name}: ${chunks.length} sections indexed`);
    }catch(e){ toast('⚠ '+e.message); }
  }
  renderDocsPanel();
}

  await DB.del(id); userDocs=userDocs.filter(d=>d.id!==id); renderDocsPanel(); toast('Document removed');

    <h2>One-time download</h2>
    <p class="sub">Runs fully on your device via WebGPU (iOS 18+ Safari / recent Chrome). Downloads once, then cached — works offline after. On Wi-Fi recommended.</p>
    ${LLM_MODELS.map(m=>`<button class="btn block" style="margin-bottom:8px" onclick="loadLLM('${m.id}');this.closest('.sheet').remove()">${m.label}</button>`).join('')}
    <p class="sub" style="font-size:12px">Tip: the ⚡ Instant engine answers from your lab content with zero download — for sign-off prep it's usually all you need.</p>
    <button class="btn block" id="cl">Cancel</button></div></div>`);
  document.body.appendChild(sh);
  sh.addEventListener('click',e=>{if(e.target===sh||e.target.id==='cl')sh.remove();});
}
function renderChatInner(){
  const inner=document.getElementById('chatInner'); if(!inner)return;
  inner.innerHTML=`
    <div class="chatbox" id="chatbox">${chatMsgs.map(renderMsg).join('')}
      ${chatMsgs.length===0?`<div class="msg msg-assistant">I know your four STACK labs inside out — every symbol, setpoint, sequence, and sign-off question — plus anything you upload above (lab PDFs, slides, notes).\n\n⚡ <b>Instant</b>: immediate answers from that content, fully offline.\n🧠 <b>Local model</b>: a small AI running on your phone for free-form conversation (one-time download).\n\nTry the quick buttons, or ask anything.</div>`:''}</div>
    <div class="chat-bar">
      <input class="search" id="chatq" placeholder="Ask about any STACK concept…" style="margin:0"
        onkeydown="if(event.key==='Enter'){event.preventDefault();sendChat();}">
      <button class="sendbtn" id="chatbtn" onclick="sendChat()">↑</button>
    </div>`;
  setTimeout(()=>{const b=document.getElementById('chatbox');if(b)b.scrollTop=b.scrollHeight;},50);
}
function mdLite(s){
  return esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/_(.+?)_/g,'<i>$1</i>').replace(/\n/g,'<br>');
}
function renderMsg(m){ return `<div class="msg msg-${m.role}">${mdLite(m.content)}</div>`; }
function quickAsk(q){ const i=document.getElementById('chatq'); if(!i)return; i.value=q; sendChat(); }

async function sendChat(){
  if(chatLoading)return;
  const inp=document.getElementById('chatq'); if(!inp)return;
  let txt=inp.value.trim(); if(!txt)return;
  inp.value='';
  // pending quiz answer?
  if(chatPendingQuiz && /^[abcd]$/i.test(txt)){
    const idx='abcd'.indexOf(txt.toLowerCase());
    const pq=chatPendingQuiz; chatPendingQuiz=null;
    chatMsgs.push({role:'user',content:txt.toUpperCase()});
    chatMsgs.push({role:'assistant',content:(idx===pq.answer?'✓ Correct! ':'✗ Not quite — the answer is '+'ABCD'[pq.answer]+') '+pq.opts[pq.answer]+'.\n\n')+pq.expl});
    renderChatInner(); return;
  }
  if(txt==='__quiz__'){ chatMsgs.push({role:'user',content:'Quiz me'}); chatMsgs.push({role:'assistant',content:quizMe()}); renderChatInner(); return; }
  chatMsgs.push({role:'user',content:txt});
  chatLoading=true;
  const box=document.getElementById('chatbox');
  if(box){box.innerHTML=chatMsgs.map(renderMsg).join('')+`<div class="msg msg-assistant msg-loading">Thinking</div>`;box.scrollTop=box.scrollHeight;}
  let reply;
  try{
    if(chatEngine==='llm'&&llm.engine){
      reply=await llmAnswer(txt,chatMsgs.slice(0,-1).map(m=>({role:m.role,content:m.content})));
    }else{
      if(chatEngine==='llm') reply='(Local model not loaded yet — answering with the Instant engine.)\n\n'+instantAnswer(txt);
      else reply=instantAnswer(txt);
    }
  }catch(e){ reply='Local model error: '+e.message+'\n\nFalling back to Instant:\n\n'+instantAnswer(txt); }
  chatMsgs.push({role:'assistant',content:reply});
  chatLoading=false;
  renderChatInner();
}

/* ---------- boot ---------- */
window.nav=nav; window.openRef=openRef; window.openChat=openChat;
window.handleUpload=handleUpload; window.deleteDoc=deleteDoc;
window.quickAsk=quickAsk; window.sendChat=sendChat;
window.showModelPicker=showModelPicker; window.loadLLM=loadLLM;
document.getElementById('tabs').innerHTML=TABS.map(([r,n,p])=>`
  <button data-r="${r}" onclick="nav('${r}')"><svg viewBox="0 0 24 24"><path d="${p}"/></svg>${n}</button>`).join('');
renderHeader(); bumpStreak(); nav('home'); loadDocs();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

</script>

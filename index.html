<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Mechatronics Stack Mastery</title>
<meta name="theme-color" content="#0B1119">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mech Stacks">
<style>
/* Mechatronics Stack Mastery — blueprint-night design system */
:root{
  --bg:#0B1119; --panel:#121B27; --panel2:#0D1521; --line:#243447;
  --ink:#E2EAF4; --dim:#8CA3BC;
  --pneu:#5BC8F5; --hyd:#F5A94B; --elec:#6FE08B; --acdc:#C9A0F5;
  --plc:#4FD6C6; --sens:#E8D44D; --mot:#F2675B; --micro:#6E8CFF; --ctrl:#F06FB0;
  --danger:#FF6B6B; --gold:#F2C14E;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  overscroll-behavior-y:contain}
body{padding-bottom:calc(64px + env(safe-area-inset-bottom))}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
h1,h2,h3{margin:0 0 .35em;line-height:1.2}
.eyebrow{font:600 11px/1 var(--mono);letter-spacing:.14em;color:var(--dim);text-transform:uppercase}

/* header */
header{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px;
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;background:rgba(11,17,25,.92);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
header .brand{font:700 15px var(--mono);letter-spacing:.04em}
header .spacer{flex:1}
.pill{display:inline-flex;align-items:center;gap:5px;font:600 12px var(--mono);
  background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:4px 10px}
.pill.gold{color:var(--gold)}
.pill.fire{color:var(--danger)}

main{padding:16px;max-width:680px;margin:0 auto}

/* bottom tab bar */
nav{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;
  background:rgba(13,21,33,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:9px 0 7px;color:var(--dim);font:600 10px var(--mono);letter-spacing:.06em}
nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
nav button.on{color:var(--ink)}
nav button.on::after{content:"";width:18px;height:2px;border-radius:2px;background:var(--ink);margin-top:2px}

/* cards */
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.card.tap{transition:transform .08s}
.card.tap:active{transform:scale(.985)}
.cardrow{display:flex;align-items:center;gap:12px}
.grow{flex:1;min-width:0}
.sub{color:var(--dim);font-size:13px}
.stackdot{width:10px;height:10px;border-radius:3px;flex:none}

/* mastery ring */
.ring{position:relative;width:56px;height:56px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:grid;place-items:center;font:700 13px var(--mono)}

/* progress bars */
.bar{height:6px;border-radius:4px;background:var(--panel2);overflow:hidden;margin-top:6px}
.bar i{display:block;height:100%;border-radius:4px;background:var(--gold);transition:width .4s}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:var(--panel2);border:1px solid var(--line);border-radius:12px;
  padding:11px 16px;font-weight:600;min-height:44px}
.btn.primary{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.btn.block{width:100%}
.btn:active{transform:scale(.98)}

/* segmented + controls */
.seg{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:8px 0}
.seg button{flex:1;padding:10px 6px;font:600 12.5px var(--mono);color:var(--dim);min-height:42px}
.seg button.on{background:var(--panel);color:var(--ink);box-shadow:inset 0 0 0 1px var(--line)}
.ctrls{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.ctl{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 14px;
  font:600 13px var(--mono);min-height:44px;flex:1 1 40%}
.ctl.on{border-color:var(--elec);color:var(--elec)}
.ctl.go{border-color:var(--elec);color:var(--elec)}
.ctl.danger{border-color:var(--danger);color:var(--danger)}
.ctl.pressed{background:var(--line)}
.slider{flex:1 1 100%;display:flex;align-items:center;gap:10px;font:600 12px var(--mono);color:var(--dim)}
.slider b{min-width:58px;text-align:right;color:var(--ink)}
input[type=range]{flex:1;accent-color:var(--gold);min-height:34px}

/* schematic */
.simwrap{margin-top:4px}
.schematic{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:12px;display:block}
.schematic .comp{stroke:var(--dim);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.schematic .pipe,.schematic .wire{stroke:var(--line);stroke-width:2.5;fill:none;stroke-linecap:round;transition:stroke .15s}
.schematic .rail{stroke:var(--dim);stroke-width:3}
.schematic .pipe.live{stroke:currentColor;filter:drop-shadow(0 0 3px currentColor)}
.schematic .wire.live,.schematic .wire.energized,.schematic path.energized{stroke:currentColor;filter:drop-shadow(0 0 3px currentColor)}
.accent-pneu{color:var(--pneu)} .accent-hyd{color:var(--hyd)}
.accent-elec{color:var(--elec)} .accent-acdc{color:var(--acdc)}
.accent-plc{color:var(--plc)} .accent-sens{color:var(--sens)}
.accent-mot{color:var(--mot)} .accent-micro{color:var(--micro)} .accent-ctrl{color:var(--ctrl)}
.svgtag{font:600 7.5px var(--mono);fill:var(--dim);letter-spacing:.05em;stroke:none}
.svgval{font:700 8px var(--mono);fill:var(--ink);stroke:none}
.contact circle{fill:var(--dim);stroke:none}
.contact .blade{stroke:var(--dim);stroke-width:2;transition:transform .1s;transform-origin:0 0}
.contact .ncbar{stroke:var(--dim);stroke-width:2}
.contact.closed .blade{transform:rotate(24deg)}
.contact.nc .blade{transform:rotate(0)}
.contact.nc:not(.closed) .blade{transform:rotate(24deg)}
.contact.closed circle,.contact.closed .blade{stroke:currentColor;fill:currentColor}
.contact.closed .blade{stroke:currentColor}
.coil circle,.coil path{stroke:var(--dim);fill:none;stroke-width:2}
.coil.energized circle,.coil.energized path{stroke:currentColor;filter:drop-shadow(0 0 4px currentColor)}
.blade{stroke:var(--dim);stroke-width:2.5}
.readout{display:flex;justify-content:space-between;gap:10px;font:600 12px var(--mono);
  color:var(--gold);margin-top:8px;min-height:18px;flex-wrap:wrap}
.readout span:last-child{color:var(--dim)}
.meterpanel{margin-top:10px;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.mrow{display:flex;justify-content:space-between;padding:8px 12px;font:500 13px var(--mono);border-bottom:1px solid var(--panel2)}
.mrow b{color:var(--gold)}
.warnrow{padding:10px 12px;color:var(--danger);font:600 13px var(--mono)}
.okrow{padding:8px 12px;color:var(--dim);font:500 12px var(--mono)}

/* symbol grid */
.search{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:12px;
  color:var(--ink);padding:12px 14px;font:inherit;margin-bottom:10px}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:6px}
.chip{flex:none;font:600 12px var(--mono);padding:7px 12px;border-radius:999px;
  border:1px solid var(--line);color:var(--dim);background:var(--panel)}
.chip.on{color:var(--bg);background:var(--ink);border-color:var(--ink)}
.symgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.symcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px;text-align:center}
.symcard svg{width:100%;height:64px;color:var(--dim)}
.symcard b{display:block;font-size:12.5px;line-height:1.3;min-height:2.6em}
.symcard:active{transform:scale(.97)}

/* modal sheet */
.sheet{position:fixed;inset:0;z-index:50;background:rgba(5,9,14,.7);display:flex;align-items:flex-end;justify-content:center}
.sheet>div{background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;
  width:100%;max-width:680px;max-height:86vh;overflow-y:auto;padding:18px 18px calc(18px + env(safe-area-inset-bottom));
  animation:up .22s ease-out}
@keyframes up{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.sheet .symhero{height:110px;color:var(--ink);margin:6px 0}
.sheet .symhero svg{width:100%;height:100%}
.mist{border-left:3px solid var(--danger);background:var(--panel2);border-radius:0 10px 10px 0;
  padding:8px 12px;margin:8px 0;font-size:13.5px;color:var(--dim)}
.mist b{color:var(--danger);font:600 11px var(--mono);letter-spacing:.08em}

/* labs */
.step{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--panel2);align-items:flex-start}
.step:last-child{border:none}
.cb{flex:none;width:26px;height:26px;border-radius:8px;border:2px solid var(--line);display:grid;place-items:center;margin-top:1px;transition:all .15s}
.step.done .cb{background:var(--elec);border-color:var(--elec);color:var(--bg)}
.step.done .txt{color:var(--dim);text-decoration:line-through;text-decoration-color:var(--line)}
.step .txt{font-size:14.5px}
.safety{border:1px solid var(--danger);border-radius:12px;padding:10px 14px;margin:10px 0}
.safety h4{margin:0 0 6px;color:var(--danger);font:700 11px var(--mono);letter-spacing:.1em}
.safety li{font-size:13.5px;color:var(--dim);margin:4px 0}

/* quiz */
.qopt{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);
  border-radius:12px;padding:13px 14px;margin:8px 0;font-size:14.5px;min-height:48px}
.qopt.correct{border-color:var(--elec);color:var(--elec)}
.qopt.wrong{border-color:var(--danger);color:var(--danger)}
.qexp{background:var(--panel2);border-left:3px solid var(--gold);border-radius:0 10px 10px 0;
  padding:10px 12px;font-size:13.5px;color:var(--dim);margin-top:10px}
.qprog{font:600 12px var(--mono);color:var(--dim);margin-bottom:8px}

/* badges */
.badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px}
.badge{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 8px;text-align:center}
.badge .ico{font-size:26px;filter:grayscale(1);opacity:.35}
.badge.got .ico{filter:none;opacity:1}
.badge b{display:block;font-size:11px;margin-top:4px;color:var(--dim)}
.badge.got b{color:var(--ink)}

/* toast */
#toast{position:fixed;left:50%;bottom:calc(84px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
  background:var(--panel);border:1px solid var(--gold);color:var(--gold);border-radius:999px;
  padding:10px 18px;font:700 13px var(--mono);opacity:0;pointer-events:none;transition:all .25s;z-index:60;
  white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.refblock h3{font:700 12px var(--mono);letter-spacing:.08em;color:var(--gold);text-transform:uppercase}
.refblock li{font-size:14px;color:var(--dim);margin:5px 0}
.backbtn{font:600 13px var(--mono);color:var(--dim);padding:6px 0;margin-bottom:6px;display:inline-flex;gap:6px;align-items:center}

/* course */
.plain{border-left:3px solid var(--gold);background:var(--panel2);border-radius:0 10px 10px 0;
  padding:8px 12px;margin:10px 0;font-size:13.5px}
.plain b{color:var(--gold);font:600 11px var(--mono);letter-spacing:.08em}
.lesson-body{font-size:14.5px;line-height:1.55}
.lesson-body p{margin:8px 0}
.formula{background:var(--panel2);border-radius:8px;padding:8px 12px;margin:8px 0;font:600 13.5px var(--mono);color:var(--gold)}
.lessonchk{flex:none;font:600 11px var(--mono);padding:7px 12px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--dim)}
.lessonchk.on{border-color:var(--elec);color:var(--elec)}

/* exams + certificate */
.certwrap{max-width:520px;margin:0 auto}
.certwrap input{background:var(--panel);border:1px solid var(--line);border-radius:10px;
  color:var(--ink);padding:10px 12px;font:inherit;min-height:42px}
.certificate{background:var(--panel);border:2px solid var(--gold);border-radius:16px;
  padding:32px 24px;text-align:center;margin-top:10px}
.cert-eyebrow{font:700 11px var(--mono);letter-spacing:.16em;color:var(--gold);text-transform:uppercase}
.cert-title{font-size:26px;margin:10px 0 4px}
.cert-sub{color:var(--dim);font-size:13.5px;margin:6px 0}
.cert-name{font-size:22px;font-weight:700;color:var(--gold);margin:14px 0;
  border-bottom:1px solid var(--line);display:inline-block;padding:0 8px 6px}
.cert-table{width:100%;margin:18px 0;border-collapse:collapse;font-size:13.5px}
.cert-table td{padding:6px 4px;border-bottom:1px solid var(--line);text-align:left}
.cert-table td:last-child{text-align:right;font:600 13px var(--mono);color:var(--gold)}
.cert-date{color:var(--dim);font:600 12px var(--mono);margin-top:14px}
@media print{
  body{padding-bottom:0}
  header,nav,.no-print{display:none!important}
  main{max-width:100%;padding:0}
  .certificate{border-width:1px;box-shadow:none}
}

/* teacher dashboard */
.rostertable{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.rostertable th{text-align:left;color:var(--dim);font:600 10.5px var(--mono);letter-spacing:.06em;
  text-transform:uppercase;padding:6px 8px;border-bottom:1px solid var(--line)}
.rostertable td{padding:8px 8px;border-bottom:1px solid var(--panel2)}
.rostertable td.num{font:600 13px var(--mono);color:var(--gold);text-align:right}
.filebtn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
  background:var(--panel2);border:1px dashed var(--line);border-radius:12px;padding:16px;
  font-weight:600;color:var(--dim);min-height:44px;text-align:center}

@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ===== AI CHAT MODAL ===== */
.chatmodal{position:fixed;inset:0;z-index:55;background:var(--bg);display:flex;flex-direction:column;animation:fadeIn .15s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.chatmodal-hdr{display:flex;align-items:center;gap:12px;padding:calc(12px + env(safe-area-inset-top)) 16px 12px;border-bottom:1px solid var(--line);background:var(--bg);flex:none}
.chatmodal-hdr h2{margin:0;flex:1;font-size:16px}
.chatbox{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:88%;padding:11px 14px;border-radius:16px;font-size:14.5px;line-height:1.55;word-wrap:break-word;white-space:pre-wrap}
.msg-user{background:var(--ink);color:var(--bg);align-self:flex-end;border-radius:16px 16px 4px 16px;font-weight:500}
.msg-assistant{background:var(--panel2);border:1px solid var(--line);color:var(--ink);align-self:flex-start;border-radius:16px 16px 16px 4px}
.msg-loading::after{content:'●●●';letter-spacing:4px;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.chat-bar{display:flex;gap:8px;padding:10px 16px calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:var(--bg);flex:none}
.chat-bar input{flex:1;margin:0;font-size:15px}
.sendbtn{width:44px;height:44px;padding:0;border-radius:12px;background:var(--ink);color:var(--bg);font-size:20px;border:none;cursor:pointer;flex:none}
.sendbtn:disabled{opacity:.35}
.aibtn{background:linear-gradient(135deg,var(--acdc),var(--elec));color:var(--bg);border:none;border-radius:999px;padding:6px 12px;font:700 12px var(--mono);cursor:pointer;letter-spacing:.04em}
.keycard{max-width:400px;margin:40px auto;padding:24px;background:var(--panel);border:1px solid var(--line);border-radius:18px;text-align:center}
.keycard p{color:var(--dim);font-size:14px;margin:8px 0 16px}
.keycard input{width:100%;margin-bottom:12px;font-family:var(--mono)}

/* ===== IMPROVED DCV ===== */
.dcv-wrap{margin-top:10px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px}
.dcv-label{font:700 9px var(--mono);letter-spacing:.06em;text-transform:uppercase;fill:var(--dim);stroke:none}
.dcv-port{font:800 10px var(--mono);stroke:none}
.dcv-pos-label{font:700 9px var(--mono);stroke:none}
.lever-arm{stroke:var(--ink);stroke-width:5;stroke-linecap:round;transition:all .2s}
.lever-ball{fill:var(--gold);transition:all .2s}
.spool-cursor{stroke:var(--gold);stroke-width:2.5;fill:none;transition:x .2s}
.flow-arrow{stroke-width:2;fill:none;transition:opacity .2s}

/* ===== GENERAL POLISH ===== */
.schematic .svgtag{font-size:8.5px}
.schematic .svgval{font-size:9.5px}
header .aibtn{margin-left:4px}
.simwrap .seg button{font-size:11.5px}

/* ===== learning paths ===== */
.pathcard{border-left:3px solid var(--gold)}
.pathitem{display:flex;gap:10px;align-items:center;padding:7px 0;font-size:13.5px;color:var(--dim)}
.pathitem.done{color:var(--ink)}
.pathitem .pdot{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);flex:none;display:grid;place-items:center;font-size:11px}
.pathitem.done .pdot{background:var(--elec);border-color:var(--elec);color:var(--bg)}

/* ===== scenarios ===== */
.scen-setup{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:14px;color:var(--dim);margin:10px 0}
.scen-setup b{color:var(--gold);font:700 10px var(--mono);letter-spacing:.1em;display:block;margin-bottom:6px}

/* ===== AI engine & docs ===== */
.engseg{margin:0 16px 8px}
.docrow{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--panel2);font:500 13px var(--mono)}
.docrow b{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink)}
.docrow .del{color:var(--danger);font-size:16px;padding:4px 8px}
.docpanel{margin:0 16px 8px;border:1px dashed var(--line);border-radius:12px;overflow:hidden}
.docpanel-hd{display:flex;align-items:center;gap:8px;padding:10px 12px;font:600 12px var(--mono);color:var(--dim)}
.docpanel-hd .grow{flex:1}
.modelbar{margin:0 16px 8px;padding:10px 12px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;font:600 12px var(--mono);color:var(--dim)}
.modelbar .bar{margin-top:8px}
.quickbtns{display:flex;gap:6px;overflow-x:auto;padding:0 16px 8px}
.quickbtns button{flex:none;font:600 11.5px var(--mono);padding:8px 12px;border-radius:999px;border:1px solid var(--line);color:var(--acdc);background:var(--panel)}
.srcline{display:block;margin-top:8px;font:600 10.5px var(--mono);color:var(--dim);opacity:.8}
.msg-assistant h5{margin:6px 0 2px;font:700 11px var(--mono);letter-spacing:.06em;color:var(--gold)}

/* ===== PortKit: ports & hoses ===== */
.portdot{cursor:pointer;transition:all .12s}
.portdot.pend{stroke:var(--gold);stroke-width:3;r:7;filter:drop-shadow(0 0 5px var(--gold));animation:portpulse 1s infinite}
@keyframes portpulse{50%{opacity:.5}}
.portdot.used{fill:var(--line)}
.porthit{cursor:pointer}
.portlbl{font:700 8px var(--mono);stroke:none;letter-spacing:.04em}
.hose{fill:none;stroke:var(--dim);stroke-width:3.5;stroke-linecap:round;opacity:.85;transition:stroke .15s}
.hose.live{stroke:currentColor;filter:drop-shadow(0 0 4px currentColor)}
.hosehit{fill:none;stroke:transparent;stroke-width:14;cursor:pointer}
.buildstatus{font:500 12.5px var(--mono);color:var(--dim);background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 12px;margin:8px 0;line-height:1.6;min-height:18px}
.buildstatus:empty{display:none}
/* relay wire-it slots */
.slotbtn{display:block;width:100%;text-align:left;background:var(--panel2);border:1.5px dashed var(--line);border-radius:10px;padding:10px 12px;margin:5px 0;font:600 13px var(--mono);color:var(--ink);min-height:42px}
.slotbtn.ok{border-style:solid;border-color:var(--elec);color:var(--elec)}
.slotbtn.bad{border-style:solid;border-color:var(--danger);color:var(--danger)}
.partchip{margin:3px}
.partchip.on{color:var(--bg);background:var(--gold);border-color:var(--gold)}

</style>
</head>
<body>
<header id="hdr"></header>
<main id="main"></main>
<nav id="tabs"></nav>
<div id="toast"></div>
<script>

{ id:"plc_in", stack:"plc", name:"PLC input contact — addressed",
  svg:S(`<path d="M10 35 H38 M62 35 H90"/><circle cx="38" cy="35" r="3"/><circle cx="62" cy="35" r="3"/><path d="M38 35 L62 22"/><text x="50" y="55" font-size="9" text-anchor="middle" fill="currentColor" stroke="none">I:1/0</text>`),
  what:"Looks exactly like a relay NO contact, but it doesn't switch real current — it's a software bit that mirrors the physical input terminal's state (here, address I:1/0) every scan. The PLC reads this bit; it never 'closes' anything itself.",
  mistakes:["Forgetting the address — without it, two contacts that LOOK identical may reference completely different physical wires.","Expecting an input contact to change the instant the field switch changes — it only updates on the next input scan, typically milliseconds later, not mid-rung."] },
{ id:"plc_out", stack:"plc", name:"PLC output coil — addressed",
  svg:S(`<circle cx="50" cy="32" r="14"/><text x="36" y="37" font-size="10" fill="currentColor" stroke="none">O:2/0</text><path d="M10 32 H36 M64 32 H90"/>`),
  what:"A software coil tied to a physical output terminal. When the rung evaluates true during logic solve, the bit is set; the output module then energizes the real terminal during the output scan — driving a solenoid, contactor, or lamp.",
  mistakes:["Programming the SAME output address on two different rungs — most PLCs allow it syntactically but only the LAST rung's result survives the scan (the classic 'duplicate output coil' bug).","Confusing an internal/virtual bit (no physical wire) with a real output address — internal bits are for logic only and drive nothing in the field."] },
{ id:"plc_ton", stack:"plc", name:"TON — Timer On-Delay block",
  svg:S(`<rect x="22" y="10" width="56" height="44" rx="4"/><text x="50" y="24" font-size="10" text-anchor="middle" fill="currentColor" stroke="none">TON</text><path d="M30 38 h12 v-10 h12 v10 h12" /><path d="M10 30 H22 M78 30 H90"/>`),
  what:"Function block replacing the relay-world's 1TR: while its enable input is true, an internal accumulator counts up; when it reaches the PRESET, the .DN (done) bit turns on — same on-delay behavior as a pneumatic time-delay relay, programmed instead of wired.",
  mistakes:["Setting the preset in the wrong time base (0.1 s vs 1 s vs 1 ms) — exactly the dial-range mistake from the relay lab, now a software field instead of a knob.","Forgetting the accumulator RESETS the moment the enable input goes false — there's no 'pause and resume' unless you explicitly add retentive timer logic."] },
{ id:"plc_ctu", stack:"plc", name:"CTU — Count Up block",
  svg:S(`<rect x="22" y="10" width="56" height="44" rx="4"/><text x="50" y="24" font-size="10" text-anchor="middle" fill="currentColor" stroke="none">CTU</text><path d="M34 44 l8 -16 l8 16 l8 -16"/><path d="M10 30 H22 M78 30 H90"/>`),
  what:"Increments a count by 1 every time its count-input transitions false→true (e.g., a part passing a photoelectric sensor). When the accumulator reaches the PRESET, .DN turns on — used for batch counts, cycle counts, or jam detection.",
  mistakes:["Forgetting CTU needs a separate RESET instruction/rung — without one the count never returns to zero and .DN stays on forever after the first batch.","Wiring the count input to a noisy or bouncing signal — every false transient adds a phantom count; debounce the sensor or use a one-shot."] },
{ id:"plc_scan", stack:"plc", name:"The PLC scan cycle",
  svg:S(`<circle cx="50" cy="36" r="24"/><path d="M50 14 A 22 22 0 0 1 70 40"/><path d="M67 36 l4 5 l5 -3"/><text x="50" y="22" font-size="7" text-anchor="middle" fill="currentColor" stroke="none">READ I/O</text><text x="50" y="40" font-size="7" text-anchor="middle" fill="currentColor" stroke="none">SOLVE</text><text x="50" y="58" font-size="7" text-anchor="middle" fill="currentColor" stroke="none">WRITE I/O</text>`),
  what:"Every cycle (often 1–20 ms) the CPU: (1) reads all physical inputs into the input image table, (2) solves the ENTIRE ladder program top-to-bottom using that frozen snapshot, (3) writes the resulting output bits to the physical outputs — then repeats. This is why ladder rungs don't 'happen' in real time the way wired relays do.",
  mistakes:["Assuming a contact changed mid-program affects a rung evaluated earlier in the SAME scan — it won't; that rung already used the old snapshot.","Writing a program so long the scan time becomes significant (seconds) — fast-changing inputs can be missed entirely between reads."] },

// ---------- SENSORS & TRANSDUCERS ----------
{ id:"sens_pnp", stack:"sens", name:"PNP (sourcing) proximity sensor",
  svg:S(`<rect x="14" y="20" width="28" height="24" rx="3"/><path d="M42 26 H70 M42 38 H58 M58 38 V52 M70 26 V14 M14 14 H70"/><text x="28" y="55" font-size="7" text-anchor="middle" fill="currentColor" stroke="none">PNP</text><text x="64" y="20" font-size="6" fill="currentColor" stroke="none">+24V</text>`),
  what:"A PNP sensor SOURCES current: its output switches +24V onto the signal wire when the target is sensed. The PLC/relay input then sees a HIGH (positive) signal referenced to ground. Most North American industrial wiring defaults to PNP/sourcing.",
  mistakes:["Wiring a PNP sensor into an input module wired for NPN/sinking logic — the input never sees a valid signal even though the sensor LED indicates 'detected'.","Mixing PNP and NPN devices on the same input card without checking the card supports both — many sinking-only cards simply won't register a PNP signal."] },
{ id:"sens_npn", stack:"sens", name:"NPN (sinking) proximity sensor",
  svg:S(`<rect x="14" y="20" width="28" height="24" rx="3"/><path d="M42 26 H70 M42 38 H58 M58 38 V52 M70 38 V52 M14 52 H70"/><text x="28" y="55" font-size="7" text-anchor="middle" fill="currentColor" stroke="none">NPN</text><text x="64" y="58" font-size="6" fill="currentColor" stroke="none">0V</text>`),
  what:"An NPN sensor SINKS current: when the target is sensed it connects the signal wire down to ground (0 V), and the input card supplies the pull-up that sees the resulting LOW. Common in European-built equipment and some safety-rated devices.",
  mistakes:["Calling NPN 'normally open' and PNP 'normally closed' — sourcing/sinking is about CURRENT DIRECTION, not contact state; both can be wired NO or NC logic in software.","Troubleshooting a 'dead' sensor with a voltmeter referenced to the wrong rail — on a sinking sensor you must check for a LOW, not a HIGH, when the target is present."] },
{ id:"sens_induct", stack:"sens", name:"Inductive proximity sensor",
  svg:S(`<rect x="10" y="22" width="34" height="20" rx="3"/><path d="M44 32 H62"/><path d="M70 18 v28"/><path d="M62 26 a10 8 0 0 1 0 12" stroke-dasharray="3 3"/>`),
  what:"Detects metal targets only, using a high-frequency oscillating field — eddy currents in the metal damp the field and trip the output. No contact needed; common sensing range is a few millimeters. Cannot see plastic, wood, or liquid.",
  mistakes:["Mounting it expecting it to sense a plastic part — switch to capacitive or photoelectric for non-metal targets.","Ignoring the rated sensing distance and 'flush vs non-flush' mount spec — metal too close to the sides of a non-flush sensor causes false triggers."] },
{ id:"sens_photo", stack:"sens", name:"Photoelectric sensor (through-beam)",
  svg:S(`<rect x="8" y="26" width="14" height="14" rx="2"/><rect x="78" y="26" width="14" height="14" rx="2"/><path d="M22 33 H78" stroke-dasharray="4 3"/><text x="15" y="50" font-size="6" text-anchor="middle" fill="currentColor" stroke="none">EMIT</text><text x="85" y="50" font-size="6" text-anchor="middle" fill="currentColor" stroke="none">RECV</text>`),
  what:"An emitter shines a light beam (often infrared) across to a separate receiver; the output trips when the beam is BROKEN by a passing object. Through-beam gives the longest range and most reliable detection of any photoelectric style, at the cost of needing two aligned units.",
  mistakes:["Confusing through-beam (output trips on beam BREAK) with retroreflective (output trips on beam RETURN from a reflector) — the logic of 'detected' is opposite in wiring intent if you assume the wrong style.","Misaligning emitter/receiver after maintenance — a partially blocked beam can give intermittent, load-dependent false trips that look like a wiring fault."] },
{ id:"sens_encoder", stack:"sens", name:"Incremental rotary encoder",
  svg:S(`<circle cx="50" cy="32" r="20"/><path d="M50 12 v8 M50 44 v8 M30 32 h8 M62 32 h8 M37 19 l5.5 5.5 M58 39.5 l5.5 5.5 M63 19 l-5.5 5.5 M37 45 l5.5 -5.5" stroke-dasharray="2 2"/><circle cx="50" cy="32" r="3" fill="currentColor"/>`),
  what:"Generates a fixed number of digital pulses (often quadrature, channels A & B) per shaft revolution. Counting pulses gives position/speed; comparing A vs B phase gives direction. Pulses-per-revolution is the key spec — more PPR = finer resolution, but only RELATIVE position (it has no idea where 'zero' is after a power loss, unlike an absolute encoder).",
  mistakes:["Using an incremental encoder where the machine must remember position through a power cycle — it loses its count to zero/unknown and needs a home/reference move every power-up.","Counting only channel A — you get speed/position magnitude but lose direction; you need the A/B phase relationship (quadrature decoding) to know which way the shaft turned."] },
{ id:"sens_tc", stack:"sens", name:"Thermocouple",
  svg:S(`<path d="M16 50 L50 16 L84 50"/><circle cx="50" cy="16" r="4" fill="currentColor"/><text x="50" y="62" font-size="7" text-anchor="middle" fill="currentColor" stroke="none">HOT JUNCTION</text>`),
  what:"Two dissimilar metal wires joined at a hot junction generate a small voltage proportional (nonlinearly) to temperature — the Seebeck effect. Rugged, wide range, no external power needed at the sensor, but the millivolt signal needs amplification/linearization (often inside a PLC analog input card) before it means anything in °C.",
  mistakes:["Using ordinary copper wire to extend a thermocouple run instead of matched thermocouple extension wire — the splice itself becomes an unwanted junction and corrupts the reading.","Forgetting cold-junction compensation: the reading is relative to the connector's own temperature unless the instrument compensates for it."] },
{ id:"sens_4to20", stack:"sens", name:"4–20 mA current-loop transmitter",
  svg:S(`<rect x="14" y="22" width="30" height="20" rx="3"/><text x="29" y="35" font-size="7" text-anchor="middle" fill="currentColor" stroke="none">XMTR</text><path d="M44 28 H86 M44 36 H70 M70 36 V50 M14 50 H70"/>`),
  what:"A process transmitter (pressure, level, flow…) outputs a current — not a voltage — scaled 4 mA = 0% of range to 20 mA = 100%, riding on a simple two-wire loop. Current is immune to voltage drop over long wire runs, and 4 mA (not 0) as the 'zero' lets the receiving PLC distinguish a true zero reading from a broken/dead loop.",
  mistakes:["Reading 0 mA and assuming the process variable is at the bottom of range — 0 mA on a 4–20 loop means the loop is OPEN (broken wire, dead transmitter), not a valid zero reading.","Wiring the loop in parallel instead of series with the receiving resistor/input card — current loops only work as a single series path; breaking it anywhere kills the signal everywhere downstream."] },

// ---------- MOTORS & DRIVES ----------
{ id:"mot_dc", stack:"mot", name:"DC motor",
  svg:S(`<circle cx="44" cy="32" r="20"/><text x="44" y="37" font-size="11" text-anchor="middle" fill="currentColor" stroke="none">M</text><path d="M64 32 H80 M44 12 V4 M44 60 V52"/>`),
  what:"Speed is roughly proportional to applied DC voltage; torque is roughly proportional to current. Simple to control (just vary the voltage/current) but brushed versions wear mechanically at the commutator — brushless DC (BLDC) trades brush wear for electronic commutation.",
  mistakes:["Stalling a DC motor (blocked shaft) at full voltage — stall current can be many times rated current with nowhere for the heat to go, since there's no rotation to move cooling air.","Assuming 'more voltage' always means 'more speed' without checking current/torque limits — exceeding rated current overheats the windings regardless of speed."] },
{ id:"mot_induction", stack:"mot", name:"3-phase AC induction motor",
  svg:S(`<circle cx="44" cy="32" r="20"/><text x="44" y="30" font-size="9" text-anchor="middle" fill="currentColor" stroke="none">3~</text><text x="44" y="40" font-size="9" text-anchor="middle" fill="currentColor" stroke="none">M</text><path d="M64 24 H80 M64 32 H80 M64 40 H80"/>`),
  what:"The workhorse industrial motor: three offset stator windings create a rotating magnetic field; the rotor 'chases' that field but always lags slightly (slip), which is exactly what induces the rotor current that produces torque. Synchronous speed Ns = 120·f / P (P = number of poles); actual speed is always a bit below Ns under load.",
  mistakes:["Forgetting slip exists — calculating expected RPM as exactly Ns and then 'troubleshooting' a motor that's actually running correctly a few percent slower under load.","Swapping any two of the three line connections to reverse direction, then being surprised when adjacent equipment phase sequencing assumptions break — always document which two were swapped."] },
{ id:"mot_vfd", stack:"mot", name:"VFD — Variable Frequency Drive",
  svg:S(`<rect x="20" y="14" width="50" height="36" rx="4"/><text x="45" y="30" font-size="8" text-anchor="middle" fill="currentColor" stroke="none">VFD</text><path d="M30 40 q4 -8 8 0 q4 -8 8 0 q4 -8 8 0" /><path d="M8 32 H20 M70 32 H92"/>`),
  what:"Converts fixed-frequency AC to DC and back out as variable-frequency, variable-voltage AC, letting an induction motor run at any speed (not just its nameplate synchronous speed). Because Ns = 120·f/P, changing the output frequency directly changes motor speed — that's the entire trick. Voltage is varied along with frequency (constant V/Hz) so the motor's magnetic flux — and torque capability — stays roughly constant across the speed range.",
  mistakes:["Cranking frequency above the motor's rated frequency without checking the motor/load is rated for it — above base speed, voltage can no longer keep rising with frequency, so torque capability falls off.","Bypassing the VFD's ramp (accel/decel) settings to 'start it fast' — abrupt frequency jumps can desync the rotor from the field or trip overcurrent, and abrupt stops on a high-inertia load can fault on overvoltage."] },
{ id:"mot_starter", stack:"mot", name:"Motor starter — contactor + overload",
  svg:S(`<rect x="14" y="14" width="30" height="22" rx="3"/><path d="M18 18 L22 28 M26 18 L30 28 M34 18 L38 28"/><rect x="14" y="40" width="30" height="14" rx="3"/><path d="M18 47 q4 -6 6 0 q4 -6 6 0 q4 -6 6 0"/><path d="M44 25 H60 M44 47 H60"/>`),
  what:"A contactor (top) switches the motor's line power under control-circuit command, in series with an overload relay (bottom) that monitors actual motor current and trips to protect the windings from sustained overcurrent — the motor-control equivalent of the fuse in your AC/DC unit, but resettable and current-sensing rather than fixed and one-shot.",
  mistakes:["Sizing the overload to the contactor's rating instead of the MOTOR's nameplate full-load current — overload protection must match the motor, not the switching hardware.","Treating an overload trip as 'just reset it and go' without investigating why it tripped — repeated trips usually mean a mechanical binding, voltage imbalance, or undersized motor for the load."] },
{ id:"mot_stepper", stack:"mot", name:"Stepper motor",
  svg:S(`<circle cx="44" cy="32" r="20"/><path d="M44 12 v8 M44 44 v8 M24 32 h8 M56 32 h8" /><circle cx="44" cy="32" r="3" fill="currentColor"/>`),
  what:"Moves in discrete angular steps (e.g. 1.8° per step = 200 steps/rev) by energizing winding pairs in sequence — open-loop position control with no feedback needed if the load never exceeds the motor's torque (no missed steps). Cheap, precise at low-to-moderate speed, but can silently lose position if stalled.",
  mistakes:["Driving a stepper too fast for its torque curve and getting silent missed steps — without an encoder, the controller has NO way to know position was lost; the machine just slowly drifts out of calibration.","Sizing for holding torque alone and ignoring the steep torque drop-off at higher step rates — a stepper that holds great at rest may stall completely at speed."] },
{ id:"mot_servo", stack:"mot", name:"Servo motor + feedback loop",
  svg:S(`<circle cx="30" cy="32" r="14"/><text x="30" y="36" font-size="9" text-anchor="middle" fill="currentColor" stroke="none">M</text><path d="M44 32 H58"/><rect x="58" y="22" width="20" height="20" rx="3"/><path d="M68 14 V8 M50 10 L68 8 L 80 16" stroke-dasharray="3 3"/><path d="M30 46 V58 H68 V42" stroke-dasharray="2 3"/>`),
  what:"Pairs a motor (DC, BLDC, or AC) with a position/velocity feedback device (encoder/resolver) and a closed-loop drive that continuously compares commanded vs actual position and corrects error — unlike a stepper, a servo KNOWS when it's off target and actively fights to get back, at the cost of a more complex, more expensive control loop (this is control-systems feedback in physical form — see the PID unit).",
  mistakes:["Treating servo tuning as 'set and forget' — gains that work for one load inertia can ring or hunt on a different load; retune after any significant mechanical change.","Ignoring feedback-cable wiring/shielding — a noisy encoder signal corrupts the position the whole loop is built on, causing erratic, not absent, motion (often worse to diagnose than a dead motor)."] },

// ---------- MICROCONTROLLERS & EMBEDDED I/O ----------
{ id:"micro_board", stack:"micro", name:"Microcontroller board",
  svg:S(`<rect x="14" y="10" width="72" height="48" rx="4"/><circle cx="26" cy="20" r="3"/><path d="M22 34 H40 M22 42 H40 M60 34 H78 M60 42 H78"/><text x="50" y="22" font-size="7" text-anchor="middle" fill="currentColor" stroke="none">MCU</text>`),
  what:"A complete (if tiny) computer on one chip: CPU, memory, and peripherals — digital I/O pins, analog inputs, PWM-capable outputs, serial ports — all addressable from a short program. This is the brains in small embedded/mechatronic projects, sitting at the same conceptual spot a PLC sits in industrial machines, just smaller, cheaper, and usually less ruggedized.",
  mistakes:["Driving a motor or solenoid directly off a microcontroller pin — MCU pins typically source only tens of milliamps; anything beyond an LED needs a driver/relay/H-bridge between the pin and the load.","Powering sensors or actuators straight from the board's 5V/3.3V regulator without checking its current budget — exceeding it browns out the whole board, including the logic running your program."] },
{ id:"micro_pullup", stack:"micro", name:"Pull-up resistor on a digital input",
  svg:S(`<path d="M50 8 v14"/><rect x="42" y="22" width="16" height="20"/><path d="M50 42 v10"/><circle cx="50" cy="56" r="4"/><path d="M20 56 H46 M54 56 H80"/>`),
  what:"A digital input left unconnected 'floats' and can read random HIGH/LOW noise. A pull-up resistor (to +V) or pull-down (to ground) forces a known default state when nothing else is driving the pin, so a button press or sensor output gives a clean, predictable transition instead of fighting an undefined floating signal.",
  mistakes:["Leaving a button input floating and 'debugging' phantom random presses — the fix is a pull resistor (or the MCU's built-in internal pull-up), not a software workaround.","Forgetting that an internal pull-up makes the unpressed state read HIGH and the pressed state read LOW — inverted logic that trips people up reading their own code months later."] },
{ id:"micro_pwm", stack:"micro", name:"PWM — Pulse-Width Modulation",
  svg:S(`<path d="M10 50 H20 V18 H34 V50 H40 H50 V18 H64 V50 H70 H80 V18 H94"/>`),
  what:"Switches a digital output fully ON and OFF very fast; varying the fraction of time it's ON (duty cycle) controls the AVERAGE power delivered — dimming an LED, throttling a small DC motor, or producing an analog-like control signal from a purely digital pin. 50% duty ≈ half brightness/speed/voltage on average, not literally half the peak value.",
  mistakes:["Confusing PWM frequency with duty cycle — frequency (how fast it switches) mostly affects flicker/audible whine; duty cycle (% ON time) is what actually sets the average output level.","Driving an inductive load (motor, solenoid) with PWM and no flyback/snubber diode — the rapid switching of an inductor's current can spike voltage high enough to damage the driving transistor."] },
{ id:"micro_debounce", stack:"micro", name:"Button debounce",
  svg:S(`<path d="M14 30 q4 6 8 0 q4 -6 8 0 q4 14 8 0 q4 -14 8 0" stroke-dasharray="2 2"/><path d="M14 50 H78"/><text x="46" y="62" font-size="7" text-anchor="middle" fill="currentColor" stroke="none">CLEAN AFTER DEBOUNCE</text>`),
  what:"A mechanical switch's contacts physically bounce for a few milliseconds on every press/release, producing a burst of rapid HIGH/LOW chatter instead of one clean transition. Debouncing — in hardware (RC filter) or software (ignore changes faster than ~20–50 ms) — turns that chatter into the single clean edge your logic actually expects.",
  mistakes:["Counting button presses or toggling state directly off the raw pin without any debounce — a single physical press can register as 2–10 logical presses.","Over-debouncing with a huge delay — a real, fast double-press from the user gets eaten along with the bounce."] },
{ id:"micro_hbridge", stack:"micro", name:"H-bridge motor driver",
  svg:S(`<rect x="20" y="10" width="44" height="44" rx="4"/><path d="M28 18 V46 M56 18 V46 M28 32 H56"/><circle cx="42" cy="32" r="9"/><text x="42" y="35" font-size="8" text-anchor="middle" fill="currentColor" stroke="none">M</text><path d="M8 18 H20 M8 46 H20 M64 18 H82 M64 46 H82"/>`),
  what:"Four switches (transistors) arranged in an 'H' around the motor let a low-power control signal drive a higher-power motor in EITHER direction (and brake/coast), by choosing which diagonal pair of switches conducts. This is the standard bridge between a microcontroller's tiny logic-level pins and a real DC motor's current and voltage needs.",
  mistakes:["Turning on both switches on the SAME side of the bridge simultaneously — that shorts the supply directly through two transistors (a 'shoot-through' fault) and can destroy the driver instantly.","Expecting an H-bridge sized for a small hobby motor to drive a much larger motor — exceeding the driver's current rating overheats and fails it, often without warning."] },

// ---------- CONTROL SYSTEMS & PID ----------
{ id:"ctrl_openloop", stack:"ctrl", name:"Open-loop control",
  svg:S(`<rect x="10" y="22" width="26" height="20" rx="3"/><text x="23" y="35" font-size="7" text-anchor="middle" fill="currentColor" stroke="none">INPUT</text><path d="M36 32 H58"/><rect x="58" y="22" width="26" height="20" rx="3"/><text x="71" y="35" font-size="7" text-anchor="middle" fill="currentColor" stroke="none">PROCESS</text><path d="M84 32 H94"/>`),
  what:"Command goes in, action happens — with NO measurement of the actual result feeding back into the decision. A microwave timer, an un-encoded stepper, a simple toaster: all open-loop. Simple and cheap, but any disturbance (load change, friction, voltage sag) that the system didn't anticipate goes uncorrected.",
  mistakes:["Assuming open-loop is 'wrong' or obsolete — it's the right, simplest choice whenever the relationship between command and result is predictable and disturbances are small or unimportant.","Adding feedback hardware (an encoder, a sensor) without ever closing the loop in software — feedback that nothing reads and reacts to provides zero benefit over open-loop."] },
{ id:"ctrl_loop", stack:"ctrl", name:"Closed-loop (feedback) control",
  svg:S(`<rect x="32" y="8" width="24" height="16" rx="3"/><text x="44" y="19" font-size="6" text-anchor="middle" fill="currentColor" stroke="none">CTRL</text><rect x="64" y="8" width="24" height="16" rx="3"/><text x="76" y="19" font-size="6" text-anchor="middle" fill="currentColor" stroke="none">PROCESS</text><path d="M56 16 H64 M88 16 H94 V40 H44 V24"/><circle cx="20" cy="16" r="3" fill="currentColor"/><path d="M10 16 H32"/><text x="20" y="6" font-size="6" text-anchor="middle" fill="currentColor" stroke="none">SP</text>`),
  what:"The setpoint (desired value) is continuously compared to the measured process variable; the difference (error) drives a controller that adjusts the process to drive error toward zero. This loop — measure, compare, correct, repeat — is the foundation under PID control, servo motors, VFD speed regulation, and home thermostats alike.",
  mistakes:["Putting the sensor somewhere that doesn't actually represent what you care about (e.g., measuring air temp near a vent instead of where people sit) — the loop will faithfully control the WRONG thing, perfectly.","Forgetting feedback has its own time lag (sensor response, communication delay) — a loop that's fast relative to its own feedback delay can oscillate even with 'correct' tuning."] },
{ id:"ctrl_p", stack:"ctrl", name:"Proportional (P) control",
  svg:S(`<path d="M10 50 L40 50 L80 14"/><path d="M10 50 V14 M10 50 H94" stroke-dasharray="2 2"/>`),
  what:"Output = Kp × error — the bigger the error, the bigger the corrective push, in direct proportion. Simple and fast-reacting, but pure P control always leaves some steady-state error (droop): as error shrinks toward zero, so does the corrective effort, so the system settles slightly short of setpoint unless something else (like the I term) finishes the job.",
  mistakes:["Cranking Kp higher and higher to 'kill' the remaining steady-state error — that error structurally can't reach zero with P alone; high Kp instead just makes the loop more aggressive and prone to overshoot/oscillation.","Tuning Kp on a system with significant delay without backing off — high gain combined with lag is the single most common cause of control loop oscillation in the field."] },
{ id:"ctrl_i", stack:"ctrl", name:"Integral (I) control",
  svg:S(`<path d="M10 50 Q 40 50 60 30 T 94 16"/><path d="M10 50 V14 M10 50 H94" stroke-dasharray="2 2"/>`),
  what:"Output accumulates over time based on the RUNNING TOTAL of past error — as long as any error remains, the integral term keeps growing and pushing harder, which is exactly what eliminates the steady-state droop that pure P leaves behind. The cost: it reacts slowly and can 'wind up' (keep growing) during a long saturation, causing overshoot when the error finally clears.",
  mistakes:["Adding integral action to a loop with no anti-windup protection, then having a sensor fault or saturated actuator cause the integral term to grow unbounded — when the fault clears, the accumulated term causes a huge, dangerous overshoot.","Tuning Ki too aggressively on a fast process — integral action is inherently a lagging correction; too much of it overshoots and oscillates at a slower rhythm than P-only oscillation."] },
{ id:"ctrl_d", stack:"ctrl", name:"Derivative (D) control",
  svg:S(`<path d="M10 50 Q30 50 40 20 Q50 5 60 20 Q 70 40 94 44"/><path d="M10 50 V14 M10 50 H94" stroke-dasharray="2 2"/>`),
  what:"Output responds to the RATE OF CHANGE of error, not its size or accumulation — it anticipates where error is heading and pushes back early, damping overshoot and oscillation that P and I tend to introduce. Pure D produces zero correction for a constant error (no change = no derivative), so it's always used alongside P and/or I, never alone.",
  mistakes:["Applying derivative action directly to noisy sensor data — D amplifies high-frequency noise (rapid, tiny fluctuations look like huge rates of change), often requiring a filtered signal before differentiating.","Setting Kd too high expecting 'more damping is always safer' — excessive D can make the controller hypersensitive to setpoint changes and sensor noise, causing jittery, not smooth, output."] },
];

const LABS = [
{ id:"lab_pneu", stack:"pneu", title:"Basic Pneumatics STACK Lab",
  trainer:"Amatrol Basic Pneumatics trainer",
  objective:"Build and operate the meter-out flow-control circuit. Set supply pressure with the regulator, operate the 5-way/3-position DCV to extend and retract the cylinder, and use the gauges and timing observations to explain how meter-out flow control affects cylinder motion.",

{ id:"lab_ctrl", stack:"ctrl", title:"PID Tuning Lab",
  trainer:"Virtual process — simulated heater/motor-speed loop",
  objective:"Tune a simulated first-order process (heater temperature or motor speed) to its setpoint using a live PID response plot, observing the individual contribution and failure mode of P, I, and D before combining all three.",
  safety:["This is a simulation — but the tuning intuition transfers directly: on a real process, an untested aggressive gain change can overshoot into an unsafe condition (overheating, mechanical overspeed).","Always start tuning from low gains and increase gradually, on real equipment exactly as in this simulator.","Document working gain values — retuning from scratch after a maintenance event wastes time the documented values would have saved."],
  steps:[
    "Set Kp only (Ki = Kd = 0) to a low value, run the simulated step response, and record the steady-state error (droop) that remains even after the response settles.",
    "Increase Kp and re-run; note the response gets faster but also note the developing overshoot/oscillation as Kp rises.",
    "Reset Kp to a moderate value and add Ki; observe the steady-state error being driven to zero, and watch for slow overshoot if Ki is set too high.",
    "Add a small amount of Kd to the tuned P+I values; observe the damping effect on overshoot and any oscillation left over from the I term.",
    "Deliberately set Ki very high and force a long input saturation (max output clamp) in the simulator; observe the windup overshoot when the saturation finally clears.",
    "Settle on a final Kp/Ki/Kd combination that reaches setpoint with under 10% overshoot and record the response time and final gains as your tuning sign-off."],
  sim:"sim_ctrl",
  signoff:["Why does pure P control always leave some steady-state error, and which term eliminates it?","What is integral windup, and what real-world condition (besides a bad sensor) commonly triggers it?","Why is derivative action never used alone, and why is it sensitive to sensor noise?"] },

{ id:"q_relay", stack:"elec", title:"Relay Control — Timed Sequence", questions:[

 { q:"Why does Cylinder 2 extend one second after Cylinder 1?",

 { q:"An inductor fundamentally opposes…",
   a:["Change in voltage","Change in current","Heat","Magnetism"], c:1,
   x:"L resists di/dt (stores energy in its magnetic field). C resists dv/dt (electric field). Memorize the pair — it explains transformers, filters, and inductive kick." },
 { q:"Why would the lamp behave differently if this circuit ran on DC instead of 24 VAC?",
   a:["DC makes lamps brighter always","In CAP position the capacitor would charge once and block steady DC — the lamp would go out","The transformer would output more","No difference"], c:1,
   x:"Two effects: the transformer needs changing flux (no AC in = no output), and a series cap passes only changing current. Check #15's 'why' in full." },
]},
{ id:"q_plc", stack:"plc", level:"lab", title:"PLC Ladder Logic — Lab Prep", questions:[
 { q:"In one PLC scan cycle, in what order does the processor execute these three phases?",
   a:["Write outputs → solve logic → read inputs","Read inputs → solve logic (ladder) → write outputs","Solve logic → read inputs → write outputs","All three happen simultaneously"], c:1,
   x:"Every scan: read all inputs into an image table, solve the entire ladder using that frozen snapshot, then write all outputs. This is why a contact change mid-scan waits for the NEXT scan to take effect." },
 { q:"A TON (timer-on-delay) block with a 1.0 s preset will turn its .DN bit true:",
   a:["The instant its enable input goes true","1.0 second after its enable input goes true, as long as it stays true","1.0 second after its enable input goes false","Only once, ever"], c:1,
   x:"On-delay timing starts counting the moment the enable condition becomes true and only sets .DN once the preset elapses — exactly like the wired 1TR relay it replaced." },
 { q:"Why won't a contact's state change in the middle of a scan affect a rung the processor already solved earlier in that same cycle?",
   a:["The PLC ignores fast changes on purpose","The processor solves logic using the input image captured at the START of the scan; changes register on the NEXT scan","Ladder logic can't handle fast changes at all","Rungs execute in random order each cycle"], c:1,
   x:"This 'solid-state' scan behavior is fundamentally different from physical relay logic, where a contact changes the instant its coil does. Understanding scan timing matters for very fast or very precisely sequenced events." },
 { q:"Why document every I/O address as you assign it (e.g., I:1/0 = START pushbutton)?",
   a:["The PLC requires comments to run at all","An undocumented address turns any future troubleshooting into guesswork","It makes the scan run faster","It's only needed for outputs, not inputs"], c:1,
   x:"Six months later, nobody — including you — remembers which terminal is I:1/0 without documentation. A clean I/O list is the single cheapest insurance against wasted troubleshooting time." },
 { q:"Which two devices from the wired relay version (Unit 03) become pure software inside the PLC program?",
   a:["The pushbuttons and limit switches","The control relay (1CR) and the time-delay relay (1TR)","The solenoids","The power supply"], c:1,
   x:"Field devices that physically sense or act (buttons, limit switches, solenoids) stay as real wiring. Internal logic-only devices (the seal-in relay, the timer) become bits and function blocks inside the program." },
 { q:"What's the practical risk of leaving a TON timer's preset value undocumented?",
   a:["The timer won't compile","A future technician (maybe you, in six months) can't tell whether 1.0 s was the intended value or what to restore after a 'quick test' change","The PLC ignores undocumented presets","It silently defaults to 0 every restart"], c:1,
   x:"Presets are just numbers in memory — nothing flags an accidental change. Written documentation is the only thing that lets someone catch a wrong value." },
 { q:"In the PLC version, the NC limit switches are wired exactly as in the relay lab. At rest (target not present), the PLC input bit reads:",
   a:["False — no voltage reaches the input","True — the NC contact is closed at rest, so the input sees voltage","Always false regardless of wiring","Depends on the PLC brand"], c:1,
   x:"NC = closed when unactuated. Closed contact passes voltage to the input card, so the bit is TRUE at rest and goes FALSE only when the target trips the switch open." },
 { q:"Before connecting a tested PLC program to real field outputs, best practice is to:",
   a:["Skip testing — ladder logic can't have bugs","Force every output ON to check the wiring","Simulate/test it in a safe, disconnected output state first","Run it at full speed before checking any single rung"], c:2,
   x:"Verify logic behaves correctly with outputs isolated from real actuators before letting the program drive cylinders, motors, or anything that moves." },
]},
{ id:"q_sens", stack:"sens", level:"lab", title:"Sensors & Transducers — Lab Prep", questions:[
 { q:"A PNP (sourcing) sensor's output, when the target is present, does what?",
   a:["Connects the output to ground (0V)","Sources +24V out to the load, referenced to common","Opens the circuit completely","Always outputs a 4-20mA signal"], c:1,
   x:"PNP = sourcing: the output pin pushes positive voltage to whatever it's wired to. NPN = sinking: the output pin pulls the load down to ground. They must match the input card's expected wiring style." },
 { q:"A healthy 4-20 mA loop at 0% of the measured range should read:",
   a:["0 mA","4 mA","20 mA","Whatever the last value was"], c:1,
   x:"4 mA is the 'live zero' — the floor of a working loop. It lets the system tell the difference between 'process is at its minimum' and 'the loop is broken.'" },
 { q:"Convert 12 mA on a 0–150 psi transmitter span to psi.",
   a:["50 psi","75 psi","100 psi","12 psi"], c:1,
   x:"psi = (mA − 4) / 16 × range = (12−4)/16 × 150 = 0.5 × 150 = 75 psi." },
 { q:"If a 4-20mA loop that was reading steadily suddenly drops to exactly 0 mA, the most likely explanation is:",
   a:["The process variable hit the bottom of its range (a valid 4mA zero)","An open circuit/loop fault — 0mA is never a valid reading on a live loop","The transmitter recalibrated itself","Normal sensor noise"], c:1,
   x:"Since 4mA is the floor, a true 0mA reading means current isn't flowing at all — broken wire, unpowered transmitter, or a disconnected terminal, not a real process value." },
 { q:"A PNP sensor's status LED shows 'detected' but the PLC input bit never goes true. First thing to check?",
   a:["Replace the sensor","Sourcing/sinking compatibility between the sensor output and the input card","The PLC's internal clock speed","The cable's color coding"], c:1,
   x:"The sensor can be working perfectly and still never register on a card wired for the opposite output style. Always confirm sourcing-vs-sinking match before assuming the sensor is bad." },
 { q:"Sliding a target toward a proximity sensor and recording the input bit at each position primarily tells you:",
   a:["The sensor's power rating","Its rated sensing distance — where the bit actually switches","Its weight tolerance","The required wire gauge"], c:1,
   x:"Every proximity sensor has a published sensing range; verifying it on the bench confirms the part matches its datasheet and is mounted within range for the application." },
 { q:"An inductive proximity sensor detects targets that are:",
   a:["Any color object","Metallic (conductive) objects only","Only liquids","Only transparent objects"], c:1,
   x:"Inductive sensors sense disruption of a generated magnetic field — only conductive (typically metal) targets do that. Photoelectric sensors are the go-to for non-metal targets." },
 { q:"A thermocouple generates its small output voltage from:",
   a:["A battery built into the probe","The Seebeck effect — a voltage produced where two dissimilar metals join at a temperature difference","Light striking a photodiode","An internal 4-20mA transmitter circuit"], c:1,
   x:"No external power needed to generate the signal itself — though signal conditioning electronics downstream usually do need power to read it accurately." },
]},
{ id:"q_mot", stack:"mot", level:"lab", title:"Motors & Drives — Lab Prep", questions:[
 { q:"Forward and Reverse contactors are electrically interlocked because commanding both at once would:",
   a:["Slow the motor down","Create a direct line-to-line short across the supply","Save energy","Make the motor run more quietly"], c:1,
   x:"Forward and Reverse wiring crosses two of the three supply lines. Energized together, that's a dead short — the interlock makes the condition physically impossible, not just unlikely." },
 { q:"Using Ns = 120·f/P, the synchronous speed of a 4-pole motor at 60 Hz is:",
   a:["900 RPM","1800 RPM","3600 RPM","720 RPM"], c:1,
   x:"Ns = 120×60/4 = 1800 RPM." },
 { q:"Using the same formula, synchronous speed for that 4-pole motor at 45 Hz is:",
   a:["1350 RPM","1800 RPM","2400 RPM","900 RPM"], c:0,
   x:"Ns = 120×45/4 = 1350 RPM — speed scales directly with commanded frequency, which is exactly how a VFD controls speed." },
 { q:"Above a VFD's base frequency, available motor torque:",
   a:["Continues climbing","Falls off, because voltage can no longer rise along with frequency past that point","Stays exactly constant forever","Becomes negative"], c:1,
   x:"Below base frequency a VFD keeps the volts/hertz ratio constant, holding torque. Past base frequency, voltage is already at its max, so torque capability drops as frequency keeps rising." },
 { q:"An induction motor's actual RPM at a given commanded frequency is always slightly below synchronous speed Ns. This difference is called:",
   a:["Drift","Slip","Lag","Backlash"], c:1,
   x:"Slip is what creates the relative motion (and induced rotor current) that produces torque in the first place — zero slip would mean zero torque." },
 { q:"A motor starter trips on overload. The correct first response is:",
   a:["Reset immediately and restart","Investigate the likely mechanical or electrical cause before resetting","Increase the overload setting","Bypass the overload relay"], c:1,
   x:"An overload trip is a symptom (jam, bearing failure, single-phasing, etc.), not just an inconvenience. Resetting blind risks repeating — or worsening — whatever caused it." },
 { q:"The interlock between Forward and Reverse contactors is built using:",
   a:["Each contactor's NC auxiliary contact wired into the other's coil rung","A single shared pushbutton","A timer placed between the two coils","Two completely separate power supplies"], c:0,
   x:"When FWD energizes, its NC auxiliary opens and blocks the REV coil rung (and vice-versa) — a hard electrical block independent of what the operator's fingers do." },
 { q:"Why is it risky to command a VFD to drive a motor faster than the application's rated speed, even if the motor itself tolerates it?",
   a:["It always destroys the VFD","The mechanical load (fan, pump, conveyor) may not be rated for that speed and could fail","VFDs are physically incapable of exceeding 60 Hz","It voids the motor's paint warranty"], c:1,
   x:"The motor isn't the only thing spinning — check the coupled load's mechanical speed rating before pushing a VFD past standard frequency." },
]},
{ id:"q_micro", stack:"micro", level:"lab", title:"Microcontrollers & Embedded I/O — Lab Prep", questions:[
 { q:"50% PWM duty cycle dims an LED instead of literally cutting its peak voltage in half because:",
   a:["It actually does cut the peak voltage in half","The LED switches fully ON and OFF rapidly; the eye (and the load) averages the ON-time fraction as lower effective brightness/power","PWM changes the LED's color","It reduces the supply frequency"], c:1,
   x:"The instantaneous voltage during the ON pulse is unchanged — full bright. What changes is how much TIME it spends ON per cycle, and that average is what we perceive or measure as 'dimmer.'" },
 { q:"A debounce filter on a pushbutton signal removes:",
   a:["The button's color","Rapid, spurious open/close transitions (contact bounce) lasting a few milliseconds as the mechanical contact settles","All button presses entirely","The PWM signal"], c:1,
   x:"Mechanical contacts physically chatter for a few ms when pressed or released. Without filtering, software can misread one press as several." },
 { q:"In a circuit driving a real DC motor from microcontroller PWM, an H-bridge sits:",
   a:["Between the power supply and the microcontroller only","Between the microcontroller's PWM output and the motor, supplying the motor's actual current and allowing direction reversal","Inside the microcontroller chip itself","Only on AC motors, never DC"], c:1,
   x:"The microcontroller pin supplies only a low-power logic-level signal. The H-bridge is the muscle that switches real motor current and lets that small signal control both speed and direction." },
 { q:"Why can't a microcontroller pin directly drive a motor or relay coil in real hardware?",
   a:["It's against electrical code everywhere","The pin can only supply a few mA at logic voltage — far below what the load needs — and inductive back-EMF could damage the chip","Motors don't run on electricity","Pins are read-only by design"], c:1,
   x:"Always go through a properly sized driver (transistor, H-bridge, relay module) between a microcontroller pin and any real motor, solenoid, or coil." },
 { q:"Why does a real circuit need flyback protection on a motor or solenoid switched by a transistor?",
   a:["To make it louder","An inductive load releases a voltage spike when current is suddenly interrupted, which can destroy the switching transistor without a flyback diode/path","To slow the motor down on purpose","It doesn't — flyback is only a software concern"], c:1,
   x:"Inductors resist sudden current change; interrupting that current fast generates a brief high-voltage spike. A flyback diode gives that energy a safe path instead of through your transistor." },
 { q:"Why check a microcontroller board's current budget before adding several sensors/actuators?",
   a:["Purely aesthetic reasons","Exceeding the supply's current capability can brown out (reset) the entire board, not just the overloaded peripheral","It changes the board's clock speed","It voids the manufacturer's warranty only"], c:1,
   x:"A brownout resets everything — your whole program restarts, not just the one overloaded device. Budget current the same way you'd budget any other limited resource." },
 { q:"A pull-up resistor on a digital input ensures the pin reads a defined level (e.g., HIGH) when:",
   a:["The button is pressed","The button is open/not pressed — preventing a floating, undefined reading","The microcontroller is powered off","Only during active PWM output"], c:1,
   x:"An unconnected ('floating') input can pick up noise and read randomly. A pull-up (or pull-down) resistor guarantees a known default state until something actively pulls it the other way." },
 { q:"With debounce disabled, a single physical button tap typically registers in software as:",
   a:["Exactly one press, same as with debounce","Multiple rapid on/off transitions ('presses') from one physical tap","Zero presses","A PWM signal instead of a digital one"], c:1,
   x:"That chatter is exactly what debounce logic is built to filter out — without it, one tap can look like several to fast-reading software." },
]},
{ id:"q_ctrl", stack:"ctrl", level:"lab", title:"Control Systems & PID — Lab Prep", questions:[
 { q:"Pure proportional (P) control alone almost always leaves some steady-state error because:",
   a:["P control technically has no error at all","The proportional output is driven by the error itself — as error shrinks, so does the corrective output, settling where they balance above zero error","P control overshoots forever and never settles","P control has infinite gain by definition"], c:1,
   x:"P-only control needs SOME error to produce ANY output to counteract a steady load — so it settles at a small offset, never quite zero." },
 { q:"Which term, added to P, drives steady-state error to zero?",
   a:["Derivative (D)","Integral (I) — it accumulates error over time and keeps adding output until the error is gone","Proportional (P) alone, given enough time","None — error can never be fully eliminated"], c:1,
   x:"Integral action keeps growing its contribution as long as ANY error remains, which is exactly what closes the small gap P-only leaves behind." },
 { q:"Integral windup occurs when:",
   a:["The integral term keeps accumulating while the output is saturated/clamped (actuator already at max), causing a large overshoot once the saturation clears","The derivative term is set too small","The setpoint never changes","The process responds instantly with no lag"], c:0,
   x:"While the output is pinned at a limit, the real system can't respond to the integral's growing demand — but the integral keeps adding anyway. When the limit finally releases, that pent-up demand fires all at once." },
 { q:"Besides a bad sensor, what real-world condition commonly triggers integral windup?",
   a:["A perfectly tuned, lightly loaded process","A long period where the actuator/output is saturated at its max or min limit (e.g., a fully open valve) while error persists","Running the control loop faster than necessary","Using only derivative control"], c:1,
   x:"Anything that pins the output against a physical limit for an extended time — a maxed-out heater, a fully open valve against high demand — sets up classic windup conditions." },
 { q:"Derivative (D) control is never used alone, mainly because:",
   a:["It's prohibited in industrial settings","With zero error initially, D produces zero output and never drives the process toward setpoint — it only reacts to the RATE of change","D is the most powerful term and would overshoot every single time","D control behaves identically to P control"], c:1,
   x:"D only responds to how fast error is changing, not to the error's size. A process sitting at a steady (even large) error with no change gets zero help from D alone." },
 { q:"Derivative action is especially sensitive to sensor noise because:",
   a:["It amplifies the rate of change, and noise produces large, rapid (if small-amplitude) swings — exactly what a rate-of-change calculation reacts to","Noise has no real effect on derivative math","D control filters out noise automatically by design","D control ignores the sensor signal entirely"], c:1,
   x:"Tiny, fast wiggles in a noisy signal look like a huge rate of change to a derivative calculation, which can make the controller output jumpy or unstable." },
 { q:"A control loop that compares actual output to setpoint and adjusts accordingly is called:",
   a:["Open-loop","Closed-loop (feedback)","Manual control","Static control"], c:1,
   x:"Feedback — measuring the result and correcting based on the difference from target — is what makes it 'closed-loop.' Open-loop sends a command and never checks the outcome." },
 { q:"When tuning an unfamiliar real process, why start with low gains and increase gradually rather than guessing aggressive values immediately?",
   a:["Low gains void the equipment warranty","An aggressive, untested gain change can overshoot into an unsafe condition (overheating, overspeed) before you understand the process's behavior","Low gains are mandated by ISO standards","It saves electricity during tuning"], c:1,
   x:"Same shutdown-energy logic as the pneumatic/hydraulic labs: start low, observe, then increase deliberately — don't find the unsafe limit by accident." },
]},
];

 { q:"To convert a pressure reading from psi to kPa, you:",
   a:["Multiply by 6.895","Divide by 6.895","Multiply by 14.7","Add 273"], c:0,

 { q:"What is the functional difference between a regulator and a flow-control valve?",

 { q:"For a single-acting or spring-loaded load, meter-out is generally preferred over meter-in because:",

 { q:"Why must a DCV's exhaust port never be plugged?",

 { q:"ΔP across a pneumatic flow-control valve is found by:",

{ id:"ex_hyd", stack:"hyd", title:"Unit 02 Exam — Hydraulics", questions:[
 { q:"The force produced by a hydraulic cylinder is calculated as:",
   a:["F = P / A","F = P × A (pressure × piston area)","F = A / P","F = P + A"], c:1,

 { q:"A relief valve's job in a hydraulic circuit is to:",

 { q:"Correct relief-valve startup procedure for a hydraulic power unit is to:",

 { q:"Hydraulic speed control is more precise than pneumatic speed control mainly because:",

 { q:"If a relief valve is passing flow continuously during normal operation (not just at startup), that most likely indicates:",

{ id:"ex_elec", stack:"elec", title:"Unit 03 Exam — Relay Control", questions:[
 { q:"In a ladder diagram, a rung must always end in:",
   a:["Another contact","Exactly one load — never a contact to the right of the load","Two loads in series","A direct connection back to L1"], c:1,
   x:"A rung is one complete logic statement that drives a single load; contacts never appear after the load." },
 { q:"Relay ladder symbols (NO/NC contacts) are always drawn showing:",
   a:["Whatever state the machine happens to be in when drawn","The de-energized, unactuated state of the device","Only the energized state","A random reference state with no convention"], c:1,
   x:"Symbols always represent the resting, unactuated state — not a snapshot of current machine status — so the diagram reads the same regardless of when it's viewed." },
 { q:"Which logic does a set of contacts wired in PARALLEL implement?",
   a:["AND — every contact must close","OR — any one path closing is enough to pass power","NOT — it blocks power when its input is active","NAND"], c:1,
   x:"Parallel paths give multiple ways to complete the circuit — closing any one of them is sufficient, which is OR logic." },
 { q:"The Boolean expression 1CR = STOP AND (START OR 1CRA) describes:",
   a:["A simple on/off switch with no memory","A seal-in (memory) circuit — a momentary START keeps the relay energized via its own sealed-in contact, until STOP breaks the circuit","A timer circuit only","An AC-only safety interlock"], c:1,
   x:"This is the standard seal-in circuit: START or the relay's own contact (1CRA) energizes 1CR, and STOP can break the whole rung." },
 { q:"STOP is wired as an NC (normally-closed) contact, in series with the rest of the rung, because:",
   a:["NC contacts are cheaper","It's a fail-safe design — a broken STOP wire makes the circuit behave as if STOP were pressed (drops out), not as if STOP were never wired","NC contacts allow higher current","It has no safety implication, it's just convention"], c:1,
   x:"Wiring STOP NC means a wiring fault defaults to the SAFE (stopped) state rather than silently disabling the stop function." },
 { q:"An on-delay timer's timed contact (1TRA), once the timer coil (1TR) de-energizes, will:",
   a:["Stay closed for the same delay period before opening","Reset and open instantly, with no delay on the way back down","Stay closed forever","Immediately re-energize 1TR"], c:1,
   x:"On-delay timer contacts only delay on the way IN (energizing); they reset instantly the moment the coil drops out." },
]},
{ id:"ex_acdc", stack:"acdc", title:"Unit 04 Exam — AC/DC & Transformers", questions:[
 { q:"The key difference between AC and DC is that:",
   a:["DC is always higher voltage than AC","AC periodically reverses direction (60 Hz in North America); DC maintains one constant polarity","AC has no frequency","DC cannot power lamps"], c:1,
   x:"AC alternates direction at a set frequency (60 Hz in North America); DC flows in one direction only." },
 { q:"An AC voltage reading such as 24 VAC is understood as:",
   a:["The peak voltage only","An RMS value — the equivalent steady DC voltage that would deliver the same average power","Always exactly half the peak voltage by coincidence","A frequency measurement"], c:1,
   x:"RMS (root-mean-square) is the standard way AC voltage is reported, representing the equivalent DC value for power purposes." },
 { q:"Electrical power in a simple lamp circuit is calculated as:",
   a:["P = V / I","P = V × I, using V and I measured at the SAME selector position","P = V + I","P = I² only, voltage is irrelevant"], c:1,

 { q:"A transformer's secondary-to-primary voltage ratio equals:",
   a:["Vs/Vp = Np/Ns","Vs/Vp = Ns/Np (the turns ratio)","Always exactly 1, regardless of windings","The square of the turns ratio"], c:1,

 { q:"The main purpose of a roughly 1:1 isolation transformer is to:",
   a:["Significantly step up the voltage","Provide galvanic isolation — no direct electrical path between the secondary side and the source — primarily for safety","Convert AC to DC","Increase line frequency"], c:1,
   x:"A 1:1 transformer doesn't change voltage much; its value is the magnetic-only coupling that isolates the secondary from the primary supply." },
 { q:"As frequency increases, capacitive reactance Xc and inductive reactance XL behave how?",

]},
{ id:"ex_plc", stack:"plc", title:"Unit 05 Exam — PLC & Ladder Programming", questions:[
 { q:"The three phases of a PLC scan cycle, in order, are:",

 { q:"A rung referencing an input that changes in the middle of an active scan will:",
   a:["See the change immediately, mid-scan","Not see the change until the NEXT scan, since logic is solved against the snapshot taken at scan start","Crash the PLC","Always evaluate to false regardless of the change"], c:1,

 { q:"A TON (timer-on-delay) instruction's .DN bit becomes true when:",

 { q:"PLC I/O addressing (e.g., I:1/0, O:2/0) exists to:",

 { q:"In PLC ladder programming, a rung's logic (contacts) is solved using inputs and internal bits, then the result is written to:", a:["A printer","An output (coil/bit) that can drive real-world devices","The input wiring directly","Nothing — rungs are just documentation"], c:1,

 { q:"Assigning each input/output a unique address (like I:1/0) matters because:", a:["It's optional decoration","The program and the technician both need to know exactly which physical wire/terminal each bit refers to","Addresses make the PLC run faster","Only outputs need addresses"], c:1,

 { q:"A TON (timer-on-delay) function block is used to:", a:["Immediately turn an output on","Delay turning a bit ON for a set time after its enable condition becomes true","Permanently disable a rung","Count button presses"], c:1,

 { q:"Compared to a wired relay panel doing the same job, a PLC program is generally easier to change because:", a:["PLCs can't be reprogrammed","Changing the logic means editing software, not rewiring physical relays and wires","PLCs have no logic at all","Relays are always faster than PLCs"], c:1,

{ id:"qb_mot", stack:"mot", level:"beginner", title:"Motors & Drives — Fundamentals", questions:[

 { q:"A Variable Frequency Drive (VFD) controls the speed of an AC induction motor mainly by:", a:["Changing the motor's wiring color","Varying the frequency (and voltage) supplied to the motor","Physically adding more poles while running","Cooling the motor down"], c:1,

 { q:"A stepper motor moves in:", a:["Smooth continuous rotation only, like a fan","Discrete, fixed-size steps, making it useful for precise positioning without a feedback sensor","Random directions","Only one direction, ever"], c:1,

{ id:"qb_micro", stack:"micro", level:"beginner", title:"Microcontrollers & Embedded I/O — Fundamentals", questions:[

   x:"In plain English: a microcontroller is a tiny computer built into a single chip, made for reading sensors and controlling things directly — not for running a web browser." },

 { q:"PWM (Pulse Width Modulation) controls average power delivered to a load by:", a:["Changing the supply voltage continuously","Rapidly switching the output fully ON and OFF, varying the fraction of time it's ON","Changing the load's resistance","Reducing the clock speed"], c:1,

{ id:"qb_ctrl", stack:"ctrl", level:"beginner", title:"Control Systems & PID — Fundamentals", questions:[

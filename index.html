   x:"In plain English: open-loop is like setting a microwave timer and walking away — it runs the set time regardless of whether the food is actually hot. Closed-loop is checking the food's temperature and adjusting." },
 { q:"PID stands for:", a:["Power, Input, Drive","Proportional, Integral, Derivative","Pressure, Inductance, Damping","Pulse, Interval, Delay"], c:1,
   x:"The three classic correction strategies a feedback controller can blend: react to the current error (P), the accumulated error (I), and the rate of change of error (D)." },
 { q:"The Proportional (P) term's output is based on:", a:["The history of all past errors","The current error, multiplied by a gain (Kp)","Only the rate of change of error","Random noise"], c:1,
   x:"P is the simplest reaction: bigger error right now → bigger correction right now, scaled by a gain you choose." },
 { q:"The Integral (I) term's output grows based on:", a:["The instantaneous error only","The accumulated (summed) error over time","Only the rate of change of error","The setpoint value alone"], c:1,
   x:"I keeps a running tally — even a small error, left uncorrected long enough, builds a growing push until it's finally eliminated." },

]});

const UNITS=[
{ id:"pneu",
  summary:"Pneumatics uses compressed air to push pistons and valves — you control speed and direction by controlling where that air goes.",
  objectives:[
    "Explain how a basic pneumatic circuit moves air from supply to actuator and back to atmosphere.",
    "Read and apply DCV (directional control valve) symbols — ways, positions, and spool type.",
    "Convert working pressure between psi and kPa.",
    "Explain why meter-out flow control gives smoother speed control than meter-in." ],
  lessons:[
    { title:"Compressed Air Fundamentals",
      plain:"In plain English: pneumatics is just using squeezed-up air, instead of electricity or muscle, to push things.",
      body:[
        "A pneumatic circuit starts with a compressor that fills shop air lines with pressurized air, well above what any single circuit needs.",
        "At the trainer, that supply first passes through a shutoff valve (safety isolation) and a pressure regulator, which reduces and HOLDS a steady working pressure — your lab sets this to 30 psi (207 kPa) on Gauge A.",
        "Pressure (psi) measures force per area; flow (cfm) measures how much air volume moves per minute. A regulator controls pressure; a flow-control valve controls flow — they are not the same knob." ],
      formulas:["psi → kPa: multiply by 6.895 (30 psi ≈ 207 kPa)"] },
    { title:"Directional Control & Actuation",
      plain:"In plain English: a directional control valve (DCV) is an air traffic switch — it decides which port air goes IN and which port it comes OUT of.",
      body:[
        "A DCV is described by 'ways' (number of ports) and 'positions' (number of switching states). A 5/3 valve has 5 ports and 3 positions — most trainer circuits use this to extend, retract, or center a double-acting cylinder.",
        "A double-acting cylinder has two ports: cap-end and rod-end. Sending air to the cap-end and exhausting the rod-end extends the rod; reversing it retracts. The rod side has less area, so it produces slightly less force on retraction at the same pressure.",
        "Air that isn't doing work has to go somewhere — it exhausts to atmosphere through the DCV's exhaust ports, often through a muffler. Never plug an exhaust port; that traps pressure and stalls the cylinder." ] },
    { title:"Flow Control & Circuit Design",
      plain:"In plain English: to slow a cylinder down smoothly, you restrict the air LEAVING it, not the air going in — that's called meter-out.",
      body:[
        "Meter-out flow control installs a needle valve (with a one-way check valve in parallel) on the EXHAUST side. It throttles air leaving the cylinder during the controlled stroke, while the check valve lets the return stroke free-flow.",
        "Meter-in (restricting the supply side instead) sounds simpler but performs worse with single-acting or spring-loaded loads — air is compressible, so a meter-in circuit can let the load 'jump' before the throttled air catches up.",
        "ΔP across the flow-control valve is just the pressure difference measured by gauges on either side of it. A bigger ΔP means a tighter restriction." ],
      formulas:["ΔP = |Gauge A − Gauge B|"] } ],
  glossary:[
    {t:"Shutoff valve", d:"Manual on/off valve that isolates air supply from the rest of the circuit."},
    {t:"Regulator", d:"Reduces and holds supply pressure at a set value."},
    {t:"DCV (directional control valve)", d:"Valve that routes air to extend, retract, or center an actuator."},
    {t:"Double-acting cylinder", d:"Cylinder that air can drive in both directions."},
    {t:"Meter-out", d:"Flow control that restricts the exhaust side of an actuator for smooth, load-resistant speed control."},
    {t:"ΔP (pressure drop)", d:"Difference in pressure across a component, here across the flow-control valve."} ] },

{ id:"hyd",
  summary:"Hydraulics works like pneumatics but with oil instead of air — because oil doesn't compress, it gives precise, powerful, load-independent motion.",
  objectives:[
    "Explain why incompressible fluid gives hydraulics a force/precision advantage over air.",
    "Describe the role of a relief valve in setting and protecting system pressure.",
    "Calculate force from pressure and area (F = P × A).",
    "Apply ΔP calculations to flow-control valve readings." ],
  lessons:[
    { title:"Hydraulic Power Fundamentals",
      plain:"In plain English: hydraulics pumps oil instead of air, and because oil barely compresses, the system reacts instantly and can push a lot harder.",
      body:[
        "A hydraulic power unit uses an electric motor to drive a pump that draws oil from a reservoir and pushes it into the circuit. Unlike air, oil is essentially incompressible — pressure builds immediately and doesn't 'spring' under load.",
        "Force from a hydraulic cylinder follows F = P × A: pressure (psi) times the piston's working area (in²) gives force (lb). Small increases in bore size or pressure produce large jumps in available force.",
        "Because oil is a closed-loop fluid (not vented to atmosphere like air), every hydraulic circuit needs a return path back to the reservoir — there's no 'exhaust to atmosphere' step like in pneumatics." ],
      formulas:["F = P × A (force = pressure × piston area)"] },
    { title:"Pressure Control & Safety",
      plain:"In plain English: the relief valve is the pressure safety net — it opens before anything in the system can be over-pressurized and damaged.",
      body:[
        "A relief valve is a normally-closed valve set to open and dump flow back to tank once system pressure reaches its setting. It's not a flow controller — if it's passing flow continuously during normal operation, the circuit is overheating, not working correctly.",
        "Lab procedure starts the relief valve at MINIMUM pressure before starting the pump, then raises it gradually to the working setpoint (Gauge S = 300 psi / 2070 kPa). This prevents a pressure spike at startup.",
        "At shutdown, the relief should be returned to minimum and the DCV used to bleed off any trapped pressure before disconnecting anything — trapped hydraulic pressure can store enough energy to cause injury." ] },
    { title:"Flow Control & Performance",
      plain:"In plain English: the flow-control valve sets cylinder speed, and the flow meter plus two gauges let you measure exactly how much restriction you've added.",
      body:[
        "Just like pneumatics, hydraulic flow control is usually installed meter-out: it throttles oil LEAVING the cylinder, giving smooth, load-independent speed control regardless of whether the load is pushing or pulling.",
        "A flow meter reads gpm or lpm directly in the line. Gauges A and B sit on either side of the flow-control valve; ΔP tells you how much pressure drop that restriction is creating at the current setting.",
        "Because oil doesn't compress, hydraulic speed control is far more precise and repeatable than pneumatic speed control — this is why hydraulics is preferred for heavy, precise, or slow-controlled motion." ],
      formulas:["ΔP = |Gauge A − Gauge B|"] } ],
  glossary:[
    {t:"Reservoir", d:"Vented tank that hydraulic fluid is drawn from and returned to."},
    {t:"Relief valve", d:"Safety valve that opens to tank once system pressure reaches its setpoint, capping maximum pressure."},
    {t:"Flow meter", d:"Instrument that reads flow rate (gpm/lpm) in a hydraulic line."},
    {t:"F = P × A", d:"Force equals pressure times piston area — the basic hydraulic force formula."},
    {t:"Meter-out", d:"Flow control on the exhaust/return side of the actuator."} ] },

{ id:"elec",
  summary:"Relay control builds 'if this, then that' logic out of physical switches and electromagnetic coils, wired between two power rails.",
  objectives:[
    "Read ladder diagrams: rails, rungs, contacts, and coils.",
    "Explain how AND/OR/NOT logic map to series/parallel contacts and NC contacts.",
    "Design a seal-in (memory) circuit from a momentary start button.",
    "Explain how an on-delay timer changes a sequence's timing." ],
  lessons:[
    { title:"Relay Logic Fundamentals",
      plain:"In plain English: a relay ladder is a row of switches between two power rails — close enough of the right switches and the load at the end turns on.",
      body:[
        "A ladder diagram has two vertical rails, L1 (hot) and L2 (neutral/common), and horizontal rungs between them. Each rung is one logic statement that ends in exactly one load — never a contact to the right of the load.",
        "Contacts come in two flavors: normally-open (NO), open until something operates it, and normally-closed (NC), closed until operated. Symbols always show the de-energized, unactuated state — not whatever state the machine happens to be sitting in.",
        "Series contacts implement AND logic (every contact must close to pass power); parallel contacts implement OR logic (any one path closing is enough); an NC contact implements NOT (it blocks power exactly when its input is active)." ] },
    { title:"Seal-in & Memory Circuits",
      plain:"In plain English: a seal-in circuit lets a momentary push of a button keep something running even after you let go — the relay 'remembers' it's on.",
      body:[
        "A momentary START pushbutton (NO) only closes while pressed. To keep the relay (1CR) energized after release, wire one of the relay's own NO contacts (1CRA) in parallel with START — once 1CR energizes, 1CRA closes and holds the circuit on its own.",
        "STOP must be wired NC, in series with everything else on that rung. This is a fail-safe choice: if the STOP button's wire ever breaks, the circuit behaves as if STOP were pressed (drops out) rather than as if it were never wired at all.",
        "In Boolean form: 1CR = STOP AND (START OR 1CRA). That's exactly one bit of memory built entirely from hardware contacts — no software involved." ],
      formulas:["1CR = STOP AND (START OR 1CRA)"] },
    { title:"Timers & Sequencing",
      plain:"In plain English: an on-delay timer makes something wait a set number of seconds after it's told to start before its contact actually closes.",
      body:[
        "A time-delay relay (1TR) energizes immediately like any coil, but its timed contact (1TRA) doesn't close until after the preset delay elapses — this creates a timed handoff, e.g. Cylinder 2 extending exactly 1 second after Cylinder 1.",
        "On-delay timer contacts reset INSTANTLY the moment the timer coil de-energizes — they don't hold the delay on the way back down. Don't expect 1TRA to stay closed for a second after 1TR drops out.",
        "Limit switches (wired NC in this lab) let the machine sequence itself: when the moving cylinder trips the switch, it opens, dropping 1CR and retracting both cylinders automatically." ] } ],
  glossary:[
    {t:"NO contact", d:"Open at rest, closes when operated."},
    {t:"NC contact", d:"Closed at rest, opens when operated."},
    {t:"Seal-in", d:"A relay's own contact wired to hold itself energized after a momentary start signal is released."},
    {t:"1TR (on-delay timer)", d:"Coil energizes immediately; its contact closes only after a preset delay."},
    {t:"Rung", d:"One horizontal logic line in a ladder diagram, ending in a single load."} ] },

{ id:"acdc",
  summary:"AC and DC power behave differently because AC constantly reverses direction — that single fact is why we need transformers, RMS math, and reactance.",
  objectives:[
    "Distinguish AC from DC and explain what RMS voltage represents.",
    "Calculate electrical power using P = V × I.",
    "Explain transformer turns ratio and why isolation transformers matter for safety.",
    "Explain capacitive and inductive reactance and how they depend on frequency." ],
  lessons:[
    { title:"AC vs DC Fundamentals",
      plain:"In plain English: DC flows one direction like a steady river; AC sloshes back and forth dozens of times a second, like a wave.",
      body:[
        "DC (direct current) maintains one polarity. AC (alternating current) reverses direction periodically; in North America, the standard utility frequency is 60 Hz — 60 full cycles every second.",
        "Because AC voltage is constantly changing, a single AC voltage reading uses RMS (root-mean-square) — the equivalent steady DC voltage that would deliver the same average power. A 24 VAC reading IS an RMS value, not a peak value.",
        "Electrical power follows P = V × I (power = voltage × current, in watts). On the trainer's lamp circuit, always multiply V and I measured at the SAME selector position — mixing readings from different positions gives a meaningless number." ],
      formulas:["P = V × I"] },
    { title:"Transformers & Isolation",
      plain:"In plain English: a transformer trades voltage for current (or back) using two coils of wire — and an isolation transformer does that 1:1, mainly to keep you electrically separated from the source for safety.",
      body:[
        "A transformer has a primary coil (input) and secondary coil (output) wound around a shared core, with no direct electrical connection between them — only a magnetic link. The voltage ratio matches the turns ratio: Vs/Vp = Ns/Np.",
        "Current scales the opposite way: Ip/Is = Ns/Np, because power in ≈ power out, so Vp·Ip ≈ Vs·Is. Step up the voltage and you step down the current, and vice versa.",
        "The T7017A trainer's transformer is roughly 1:1 — it doesn't change voltage much, but it provides galvanic ISOLATION: the secondary side has no direct electrical path back to the building's utility wiring." ],
      formulas:["Vs/Vp = Ns/Np","Ip/Is = Ns/Np"] },
    { title:"Reactance & AC Circuit Behavior",
      plain:"In plain English: capacitors and inductors push back against AC current, and how hard they push back changes with frequency — that pushback is called reactance.",
      body:[
        "Capacitive reactance Xc = 1/(2πfC) — it goes DOWN as frequency goes up. In the CAP position of the lab circuit, Xc in series with the lamp divides the 24 V, leaving the lamp dimmer and drawing less current.",
        "Inductive reactance XL = 2πfL behaves oppositely — it goes UP as frequency increases. Both Xc and XL are measured in ohms, but unlike resistance they depend on frequency.",
        "This frequency-dependence is the whole reason AC circuit analysis needs its own toolkit beyond simple DC resistance." ],
      formulas:["Xc = 1/(2πfC)","XL = 2πfL"] } ],
  glossary:[
    {t:"RMS voltage", d:"The equivalent steady DC value of an AC voltage that delivers the same average power."},
    {t:"P = V × I", d:"Electrical power equals voltage times current."},
    {t:"Turns ratio", d:"Ratio of secondary to primary winding turns, equal to the voltage ratio of a transformer."},
    {t:"Isolation transformer", d:"Transformer (often ~1:1) used to electrically separate a circuit from its source for safety."},
    {t:"Reactance", d:"Frequency-dependent opposition to AC current from capacitors (Xc) or inductors (XL)."} ] },

{ id:"plc",
  summary:"A PLC replaces a panel of wired relays with software that re-reads every input and re-solves the whole ladder dozens of times a second.",
  objectives:[
    "Describe the 3 phases of a PLC scan cycle and why their order matters.",
    "Translate a hardwired relay ladder into PLC I/O addressing.",
    "Explain why a PLC's TON timer behaves like a hardwired on-delay timer.",
    "Compare scan-based PLC logic with the instantaneous behavior of wired relays." ],
  lessons:[
    { title:"What Is a PLC?",
      plain:"In plain English: a PLC is a small industrial computer that takes the place of a cabinet full of relays, running the same kind of ladder logic — but in software, not wires.",
      body:[
        "A Programmable Logic Controller (PLC) connects to real-world inputs (buttons, limit switches, sensors) and outputs (solenoids, motor starters, lights) through I/O modules, then runs a ladder-logic program to decide what the outputs should do.",
        "Inputs and outputs are addressed, not just named — I:1/0 might be the STOP button and O:2/0 a solenoid output. This addressing is how a physical wiring terminal maps to a specific bit the program can read or write.",
        "Unlike a wired relay, which reacts to a changed input instantly because it's a physical electrical path, a PLC's logic only updates on its own schedule — the scan cycle — which is fast but not instantaneous." ] },
    { title:"The Scan Cycle",
      plain:"In plain English: every scan, the PLC takes a single 'snapshot' of all its inputs, figures out the whole ladder using only that snapshot, then updates all the outputs at once.",
      body:[
        "Each scan has three phases, always in this order: (1) read all physical inputs into an input image table, (2) solve the entire ladder program using that frozen snapshot, (3) write the computed results to the output image table, updating the physical outputs.",
        "A rung that LOOKS like it should see an input change mid-scan won't — the PLC is working from the snapshot taken at the start of that scan. The change is picked up on the NEXT scan, not immediately.",
        "A timer instruction like TON (timer-on-delay) accumulates time across multiple scans and exposes a .DN ('done') bit once its preset elapses — the software equivalent of a hardwired on-delay relay's timed contact." ] },
    { title:"PLC vs Hardwired Relays",
      plain:"In plain English: PLCs took over from relay panels because changing the logic just means editing a program instead of re-wiring a cabinet.",
      body:[
        "A hardwired relay panel is fast and simple for fixed logic, but every logic change means physically rewiring contacts and coils. A PLC running the equivalent logic in software can be reprogrammed in minutes, with no rewiring.",
        "Seal-in logic looks almost identical between the two: a hardwired 1CR = STOP AND (START OR 1CRA) becomes a PLC rung with a Run coil sealed in by its own Run contact, gated by the same STOP/START/limit-switch inputs.",
        "The tradeoff is the scan delay: a wired relay reacts within microseconds of an electrical change, while a PLC reacts on its next scan — irrelevant for nearly all industrial control speeds, but the conceptual line between 'instant wired logic' and 'scanned software logic.'" ] } ],
  glossary:[
    {t:"Scan cycle", d:"The repeating read-inputs → solve-logic → write-outputs cycle a PLC runs continuously."},
    {t:"I/O addressing", d:"The scheme (e.g., I:1/0, O:2/0) that maps physical terminals to bits the program can use."},
    {t:"TON (timer-on-delay)", d:"PLC instruction that sets a .DN bit true after a preset time has elapsed since it was enabled."},
    {t:"Input/output image table", d:"A snapshot of all input or output bit states used during one scan."} ] },

{ id:"sens",
  summary:"Sensors turn a physical condition into an electrical signal a controller can read, and getting the wiring type right matters as much as picking the right sensor.",
  objectives:[
    "Differentiate PNP (sourcing) and NPN (sinking) sensor outputs and wire them correctly to a PLC input card.",
    "Explain the 4-20 mA current-loop standard and why it uses a 'live zero.'",
    "Convert a 4-20 mA loop reading to its represented physical value.",
    "Identify common sensor wiring mistakes." ],
  lessons:[
    { title:"Digital Sensors",
      plain:"In plain English: a proximity sensor is a switch with no moving parts — it just flips on or off when something gets close enough.",
      body:[
        "A digital (discrete) sensor outputs one of two states: present/absent, near/far, on/off. Inductive proximity sensors detect metal targets without touching them — useful for counting, end-of-travel detection, or part presence.",
        "Sensors are wired as PNP (sourcing — switches + supply to the load when active) or NPN (sinking — switches the common/− side when active). A PNP sensor must be wired to a sourcing input card, and NPN to a sinking card — mixing the two means the input never sees a valid signal even though the sensor itself works fine.",
        "Most proximity sensors also offer NO or NC output logic, independent of PNP/NPN — so a sensor can be PNP+NO, PNP+NC, NPN+NO, or NPN+NC. Always check both specs before wiring." ] },
    { title:"Analog Sensors & the 4-20 mA Loop",
      plain:"In plain English: instead of sending a voltage that could be thrown off by wire resistance, many industrial sensors send a current — and current doesn't change just because the wire is long.",
      body:[
        "A 4-20 mA current loop represents a measured range (e.g., 0-150 psi) as a current between 4 mA (0%/minimum) and 20 mA (100%/maximum). Current loops are immune to voltage drop over long wire runs, which is why they're standard in industrial transmitters.",
        "4 mA — not 0 mA — represents the minimum reading. This 'live zero' lets the system distinguish between 'measuring zero' (4 mA, loop healthy) and 'broken wire/dead sensor' (0 mA, no current at all).",
        "To convert a loop reading to its physical value: percent = (mA − 4)/16, then value = percent × full-scale range. For example, 12 mA on a 0-150 psi loop = (12−4)/16 = 50% = 75 psi." ],
      formulas:["percent = (mA − 4) / 16","value = percent × full-scale range"] },
    { title:"Choosing & Wiring Sensors",
      plain:"In plain English: most 'sensor doesn't work' problems aren't bad sensors — they're a sourcing/sinking mismatch or a sensor set up for the wrong target distance.",
      body:[
        "When selecting a sensor, match it to the target material (inductive for metal, capacitive for nonmetal, photoelectric for line-of-sight, ultrasonic for distance), the required sensing range, and the controller's input card type.",
        "Before troubleshooting wiring, check the sensor's own status LED — most light when the sensor detects a target, independent of what the PLC sees. If the LED is correct but the PLC input never changes, suspect a PNP/NPN mismatch.",
        "For loop instruments, a broken wire reads as 0 mA at the receiving end (below the 4 mA live zero) — a deliberate, detectable fault signature." ] } ],
  glossary:[
    {t:"PNP (sourcing)", d:"Sensor output type that switches the positive supply to the load when active."},
    {t:"NPN (sinking)", d:"Sensor output type that switches the common/negative side to the load when active."},
    {t:"4-20 mA loop", d:"Industrial analog signal standard where current represents a measured range; 4 mA = 0%, 20 mA = 100%."},
    {t:"Live zero", d:"The use of 4 mA (not 0 mA) as the minimum loop value, so a broken wire is detectable as 0 mA."} ] },

{ id:"mot",
  summary:"AC motors spin at a speed set by line frequency and pole count, and a VFD controls that speed by changing the frequency the motor sees.",
  objectives:[
    "Calculate synchronous speed from frequency and pole count.",
    "Explain motor slip and why a motor's actual speed is slightly below sync speed.",
    "Explain reversing-starter interlocking and the hazard it prevents.",
    "Describe how a VFD's V/Hz control affects torque above and below base frequency." ],
  lessons:[
    { title:"AC Induction Motor Fundamentals",
      plain:"In plain English: an AC motor's top speed is set by two things you can count — how fast the power alternates (frequency) and how many magnetic poles the motor has.",
      body:[
        "Synchronous speed Ns = 120 × f / P, where f is line frequency in Hz and P is the number of poles. A standard 4-pole motor on 60 Hz line power has Ns = 120×60/4 = 1800 RPM.",
        "An induction motor's rotor never quite catches up to that synchronous speed — the difference is called slip, and it's what actually induces current (and torque) in the rotor. A typical motor might run at 1750 RPM against an 1800 RPM sync speed — about 3% slip.",
        "More poles means a lower synchronous speed at the same frequency; fewer poles means higher speed — this is why motors are sold by pole count (2, 4, 6, 8-pole) as a primary speed spec." ],
      formulas:["Ns = 120 × f / P"] },
    { title:"Motor Starters & Reversing",
      plain:"In plain English: a reversing starter swaps two motor leads to run the motor backward — but if both directions ever got energized at the same time, it would create a dead short, so interlocking exists to make that impossible.",
      body:[
        "A reversing starter uses two contactors — one wired for forward rotation, one for reverse (with two motor leads swapped) — sharing the same motor. Energizing the forward contactor spins the motor one way; energizing the reverse contactor spins it the other.",
        "If forward and reverse contactors both closed at once, line-to-line voltage would be shorted directly across two phases — a severe fault. Interlocking (electrical, mechanical, or both) physically prevents both contactors from energizing simultaneously.",
        "Always wire STOP as NC and design any direction-selection logic so the interlock can never be bypassed — this is a hard safety requirement, not a style choice." ] },
    { title:"Variable Frequency Drives",
      plain:"In plain English: a VFD changes a motor's speed by changing the frequency of the power it feeds the motor — but it also has to change the voltage to match, or the motor runs weak or burns up.",
      body:[
        "A VFD's basic control strategy is Volts/Hertz (V/Hz): as it raises output frequency, it raises output voltage proportionally, keeping the V/Hz ratio constant up to the motor's rated (base) frequency, typically 60 Hz. This keeps available torque roughly constant across that speed range.",
        "Above base frequency, the VFD can't keep raising voltage (it's already at maximum), so the V/Hz ratio drops and available torque falls off — pushing a motor well above 60 Hz trades torque for speed.",
        "Below base frequency, torque is largely maintained (often 100%), which is why VFDs are popular for variable-speed pumps, fans, and conveyors: full torque is available with smooth, controlled acceleration instead of an across-the-line shock start." ] } ],
  glossary:[
    {t:"Synchronous speed", d:"Theoretical no-slip rotor speed: Ns = 120f/P."},
    {t:"Slip", d:"The difference between synchronous speed and actual rotor speed, which is what generates rotor torque."},
    {t:"Interlocking", d:"A safeguard that prevents two contactors (e.g., forward/reverse) from energizing at the same time."},
    {t:"V/Hz control", d:"A VFD's strategy of raising voltage and frequency together to keep motor torque roughly constant below base frequency."},
    {t:"Base frequency", d:"The motor's rated frequency (commonly 60 Hz) above which a VFD can no longer maintain full V/Hz ratio."} ] },

{ id:"micro",
  summary:"A microcontroller is a tiny computer with built-in pins for reading switches and driving outputs — and a lot of 'real-world' engineering is just cleaning up noisy signals before code can trust them.",
  objectives:[
    "Differentiate a microcontroller's role from a PLC's role in a control system.",
    "Explain contact bounce and why debounce logic is necessary.",
    "Explain PWM and how duty cycle relates to an effective analog output level.",
    "Identify when software debounce vs. hardware debounce is appropriate." ],
  lessons:[
    { title:"Microcontroller Basics",
      plain:"In plain English: a microcontroller is a tiny, cheap, single-chip computer with pins you can wire directly to switches, sensors, and small loads.",
      body:[
        "A microcontroller (MCU) integrates a processor, memory, and I/O pins (GPIO) on one chip. Compared to a PLC, it's smaller, cheaper, and programmed in code rather than ladder logic — common in embedded products and robotics rather than industrial control panels.",
        "Each GPIO pin can typically be a digital input or output, and many support PWM output and analog input on top of that — far more flexible per-pin than a fixed PLC I/O card, but with less industrial ruggedness and fewer built-in safety features.",
        "Where a PLC scan cycle reads/solves/writes on a fixed schedule, an MCU program runs a tight loop that can check inputs and update outputs thousands of times per second — fast enough that contact bounce becomes a visible problem if not handled." ] },
    { title:"Signal Conditioning — Debounce",
      plain:"In plain English: a mechanical switch doesn't close cleanly — it bounces open and shut several times in a few milliseconds, and without debounce logic your code sees that as several separate presses instead of one.",
      body:[
        "Contact bounce happens because the metal contacts inside a mechanical switch physically vibrate against each other for a few milliseconds when pressed or released, generating multiple rapid transitions instead of one clean edge.",
        "Software debounce ignores additional transitions for a short window (commonly 10-50 ms) after the first detected change — by the time that window ends, the bounce has settled and the signal reads as a single clean event.",
        "Hardware debounce uses an RC filter or a dedicated debounce IC to smooth the electrical signal before it reaches the microcontroller pin — useful when you don't want to spend code/CPU time on it, at the cost of extra components." ] },
    { title:"PWM & Analog Output",
      plain:"In plain English: PWM fakes an analog signal by switching a digital output on and off very fast — the fraction of time it's ON (the duty cycle) is what determines the effective 'analog' level.",
      body:[
        "Pulse-width modulation (PWM) holds an output pin at a fixed frequency but varies the percentage of each cycle spent HIGH (duty cycle) versus LOW. 0% duty is always off, 100% is always on, and 50% looks like 'half power' to an averaging load.",
        "This is how microcontrollers control motor speed, LED brightness, and servo position without a true analog output circuit — the load itself (or a simple filter) averages the rapid switching into an effective continuous level.",
        "PWM frequency matters too: too low and switching becomes visible/audible (flickering, whining); too high and some loads can't respond fast enough. Typical PWM frequencies range from a few hundred Hz to tens of kHz." ] } ],
  glossary:[
    {t:"GPIO", d:"General-purpose input/output pin on a microcontroller, configurable as digital input or output."},
    {t:"Contact bounce", d:"Rapid, unintended on/off transitions produced by a mechanical switch as its contacts settle."},
    {t:"Debounce", d:"Software or hardware technique that filters out contact bounce so only one clean transition is registered."},
    {t:"PWM (pulse-width modulation)", d:"Technique that approximates an analog output level by varying the duty cycle of a fast digital switching signal."},
    {t:"Duty cycle", d:"The percentage of each PWM cycle spent in the HIGH (on) state."} ] },

{ id:"ctrl",
  summary:"Closed-loop control means a system constantly checks its own error (setpoint minus actual) and corrects itself — PID is just three different ways of reacting to that error, combined.",
  objectives:[
    "Differentiate open-loop and closed-loop control.",
    "Explain the individual roles of the P, I, and D terms in a PID controller.",
    "Explain steady-state droop in a P-only controller and why integral action removes it.",
    "Explain integral windup and how anti-windup prevents it." ],
  lessons:[
    { title:"Open-Loop vs. Closed-Loop Control",
      plain:"In plain English: open-loop control gives a command and hopes; closed-loop control gives a command, measures the result, and keeps adjusting until the result matches what was wanted.",
      body:[
        "An open-loop system has no feedback — it applies a fixed action regardless of outcome (e.g., a toaster set for a fixed time, with no temperature sensing). It's simple but can't compensate for disturbances or changing conditions.",
        "A closed-loop (feedback) system continuously measures the actual process variable (PV), compares it to the desired setpoint (SP), and computes an error that drives a controller's output to push PV toward SP.",
        "Almost every precision industrial process — temperature, pressure, position, speed — uses closed-loop control because real-world disturbances make open-loop control too imprecise to hold a target value." ],
      formulas:["error = SP − PV"] },
    { title:"The PID Controller",
      plain:"In plain English: PID reacts to error three different ways at once — proportional reacts to how big the error is right now, integral reacts to how long the error has stuck around, and derivative reacts to how fast the error is changing.",
      body:[
        "Proportional (P) action produces an output directly proportional to the current error. A P-only controller reacts immediately but typically settles with a steady-state offset (droop) — the bigger the load, the bigger the leftover error needed just to keep producing enough output.",
        "Integral (I) action accumulates error over time. As long as ANY error persists, the integral term keeps growing the output until error reaches zero — this is what eliminates the steady-state droop that P alone leaves behind.",
        "Derivative (D) action reacts to the RATE of change of error. It adds a 'braking' effect that anticipates overshoot — pulling output back down as the process variable approaches the setpoint quickly — which can reduce overshoot but also amplifies measurement noise if overused." ],
      formulas:["output = Kp·error + Ki·∫error dt + Kd·(d(error)/dt)"] },
    { title:"Tuning & Real-World Behavior",
      plain:"In plain English: tuning PID is a tradeoff game — push too hard for speed and you overshoot; integrate too aggressively without limits and the controller can get 'stuck' overcorrecting (windup).",
      body:[
        "Overshoot is how far the process variable swings past the setpoint before settling; settling time is how long it takes to stabilize. Higher Kp generally speeds response but increases overshoot; adding Kd can tame that overshoot at the cost of noise sensitivity.",
        "Integral windup happens when the controller's output saturates (hits its maximum) while error is still present — the integral term keeps accumulating even though the extra output can't be delivered, so when the process finally catches up, the controller way overshoots before it can 'unwind' that excess.",
        "Anti-windup pauses integral accumulation while the output is saturated, so the integral term never builds up more than the system can actually use — keeping the eventual recovery clean instead of a big overshoot-and-settle swing." ] } ],
  glossary:[
    {t:"Setpoint (SP)", d:"The desired target value for the process variable."},
    {t:"Process variable (PV)", d:"The actual, measured value of whatever is being controlled."},
    {t:"Droop", d:"A P-only controller's steady-state offset between setpoint and process variable under load."},
    {t:"Integral windup", d:"Excess integral accumulation while a controller's output is saturated, causing overshoot once it un-saturates."},
    {t:"Anti-windup", d:"A technique that pauses integral accumulation while the controller output is saturated."} ] },
];

</script>
<script>
/* sim.js v3 — connection-based circuit building.
   PortKit: tap port → tap port = hose. Tap hose = remove. Union-find nets,
   BFS pressure/flow propagation through component internal edges.
   Guided mode = pre-connected & locked. Build mode = empty board, mistakes
   produce physically-correct failures. */

const SIMS = {};

/* ============ shared helpers ============ */
function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function gaugeFace(id,label,color){
  const c=color||'currentColor';
  const ticks=[0,1,2,3,4].map(i=>{const a=(-130+i*65)*Math.PI/180;
    return `<line x1="${Math.cos(a)*15}" y1="${Math.sin(a)*15}" x2="${Math.cos(a)*19}" y2="${Math.sin(a)*19}" stroke="${c}" stroke-width="1.5" opacity=".55"/>`;}).join('');
  return `<g class="gauge" id="${id}"><circle r="21" fill="var(--panel2)" stroke="var(--line)" stroke-width="1.5"/>${ticks}
    <line class="needle" x1="0" y1="2" x2="0" y2="-14" stroke="var(--danger)" stroke-width="2.5" stroke-linecap="round" transform="rotate(-120)"/>
    <circle r="3" fill="var(--ink)"/>
    <text y="30" text-anchor="middle" class="svgtag" style="fill:${c};font-size:8.5px">${label}</text>
    <text y="40" text-anchor="middle" class="svgval" id="${id}_v" style="font-size:9px">0</text></g>`;
}
function setGauge(svg,id,val,max,unit){
  const n=svg.querySelector(`#${id} .needle`); if(!n)return;
  n.setAttribute('transform',`rotate(${-120+240*Math.max(0,Math.min(1,val/max))})`);
  const t=svg.querySelector(`#${id}_v`); if(t)t.textContent=Math.round(val)+(unit||' psi');
}
function holdable(btn,dn,up){
  const d=e=>{e.preventDefault();btn.classList.add('pressed');dn();};
  const u=()=>{btn.classList.remove('pressed');up&&up();};
  btn.addEventListener('pointerdown',d);
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>btn.addEventListener(ev,u));
  btn.addEventListener('contextmenu',e=>e.preventDefault());
}

/* ============ PortKit — connection engine ============ */
function PortKit(svg, ports, opts={}){
  const K={conns:[], pending:null, locked:false, onChange:opts.onChange||(()=>{})};
  const byId={}; ports.forEach(p=>byId[p.id]=p);
  // layers
  const hoseL=document.createElementNS('http://www.w3.org/2000/svg','g');
  const portL=document.createElementNS('http://www.w3.org/2000/svg','g');
  svg.appendChild(hoseL); svg.appendChild(portL);
  // draw ports
  ports.forEach(p=>{
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.innerHTML=`<circle class="porthit" data-port="${p.id}" cx="${p.x}" cy="${p.y}" r="13" fill="transparent"/>
      <circle class="portdot" data-port="${p.id}" cx="${p.x}" cy="${p.y}" r="5.5" fill="var(--panel2)" stroke="${p.color||'var(--dim)'}" stroke-width="2"/>
      ${p.label?`<text x="${p.x+(p.lx||0)}" y="${p.y+(p.ly||-10)}" text-anchor="middle" class="portlbl" style="fill:${p.color||'var(--dim)'}">${p.label}</text>`:''}`;
    portL.appendChild(g);
  });
  function hosePath(a,b){
    const A=byId[a],B=byId[b];
    const mx=(A.x+B.x)/2, my=Math.max(A.y,B.y)+22+Math.abs(A.x-B.x)*0.08;
    return `M${A.x} ${A.y} Q ${mx} ${my} ${B.x} ${B.y}`;
  }
  function redraw(){
    hoseL.innerHTML=K.conns.map((c,i)=>
      `<path class="hose" data-h="${i}" d="${hosePath(c[0],c[1])}"/>
       <path class="hosehit" data-h="${i}" d="${hosePath(c[0],c[1])}"/>`).join('');
    portL.querySelectorAll('.portdot').forEach(d=>{
      const id=d.dataset.port;
      d.classList.toggle('pend',K.pending===id);
      d.classList.toggle('used',deg(id)>0);
    });
  }
  function deg(p){ return K.conns.filter(c=>c[0]===p||c[1]===p).length; }
  function nets(){
    const parent={}; ports.forEach(p=>parent[p.id]=p.id);
    const find=x=>{while(parent[x]!==x)x=parent[x]=parent[parent[x]];return x;};
    K.conns.forEach(([a,b])=>{parent[find(a)]=find(b);});
    return {find, same:(a,b)=>find(a)===find(b)};
  }
  /* reach: BFS over conns + internal edges (list of [a,b]) from start ids */
  function reach(starts, internal){
    const adj={}; ports.forEach(p=>adj[p.id]=[]);
    K.conns.concat(internal).forEach(([a,b])=>{ if(adj[a]&&adj[b]){adj[a].push(b);adj[b].push(a);} });
    const seen=new Set(starts.filter(s=>adj[s])); const q=[...seen];
    while(q.length){ const n=q.pop(); adj[n].forEach(m=>{ if(!seen.has(m)){seen.add(m);q.push(m);} }); }
    return seen;
  }
  svg.addEventListener('click',e=>{
    if(K.locked) return;
    const port=e.target.dataset&&e.target.dataset.port;
    const h=e.target.dataset&&e.target.dataset.h;
    if(h!=null){ K.conns.splice(+h,1); K.pending=null; redraw(); K.onChange(); return; }
    if(port){
      if(K.pending===null){ K.pending=port; }
      else if(K.pending===port){ K.pending=null; }
      else{
        const a=K.pending,b=port;
        const exists=K.conns.findIndex(c=>(c[0]===a&&c[1]===b)||(c[0]===b&&c[1]===a));
        if(exists>=0) K.conns.splice(exists,1);
        else{
          const maxA=byId[a].max||1, maxB=byId[b].max||1;
          if(deg(a)>=maxA||deg(b)>=maxB){ K.flash&&K.flash('Port full — remove a hose first'); }
          else K.conns.push([a,b]);
        }
        K.pending=null;
      }
      redraw(); K.onChange();
    }
  });
  K.paint=(liveIds)=>{ // set of port ids that are pressurized
    hoseL.querySelectorAll('.hose').forEach(h=>{
      const c=K.conns[+h.dataset.h]; if(!c)return;
      h.classList.toggle('live',liveIds.has(c[0])||liveIds.has(c[1]));
    });
  };
  K.set=(conns)=>{K.conns=conns.map(c=>[...c]);K.pending=null;redraw();K.onChange();};
  K.clear=()=>K.set([]);
  K.lock=(v)=>{K.locked=v;portL.style.opacity=v?0.55:1;};
  K.same=(a,b)=>nets().same(a,b);
  K.reach=reach; K.deg=deg;
  redraw();
  return K;
}

/* ============ 1. PNEUMATICS — buildable ============ */
SIMS.sim_pneu = {
  title:"Pneumatic Meter-Out Circuit", stack:"pneu",
  desc:"Build it like the real bench: tap two ports to run a hose, tap a hose to remove it. Wrong plumbing fails the way it fails on the trainer.",
  mount(root,api){
    root.innerHTML=`
    <div class="simwrap">
      <div class="seg" id="pMode"><button data-m="guided" class="on">Guided (pre-connected)</button><button data-m="build">🔧 Build it yourself</button></div>
      <div class="buildstatus" id="pStatus"></div>
      <svg id="psvg" viewBox="0 0 360 300" class="schematic accent-pneu">
        <g transform="translate(50,40)">${gaugeFace('gA','GAUGE A','var(--pneu)')}</g>
        <g transform="translate(310,40)">${gaugeFace('gB','GAUGE B','var(--pneu)')}</g>
        <!-- supply -->
        <g transform="translate(14,118)"><path d="M0 -8 l14 8 l-14 8z" fill="var(--dim)"/><text x="7" y="22" text-anchor="middle" class="svgtag">SUPPLY</text></g>
        <!-- shutoff -->
        <g transform="translate(64,106)"><rect class="comp" x="0" y="0" width="34" height="24" rx="4"/><path class="comp" d="M7 5 L27 19 M27 5 L7 19"/><text x="17" y="36" text-anchor="middle" class="svgtag">SHUTOFF</text></g>
        <!-- regulator (Gauge A fixed-plumbed) -->
        <g transform="translate(128,106)"><rect class="comp" x="0" y="0" width="38" height="24" rx="4"/><path class="comp" d="M5 19 L33 7 m-6 -2 l6 2 l-2 6"/><path class="comp" d="M19 0 v-7 m-5 0 h10"/><text x="19" y="36" text-anchor="middle" class="svgtag">REGULATOR</text></g>
        <path class="pipe" d="M147 99 C 120 80 75 65 56 60" opacity=".5" stroke-dasharray="3 4"/>
        <!-- DCV -->
        <g transform="translate(120,176)">
          <rect class="comp" x="0" y="0" width="32" height="40" fill="var(--panel)" opacity=".8"/><rect class="comp" x="32" y="0" width="32" height="40" fill="var(--panel)" opacity=".8"/><rect class="comp" x="64" y="0" width="32" height="40" fill="var(--panel)" opacity=".8"/>
          <path class="comp" d="M4 34 L28 6 M28 34 L4 6" id="pCellExt"/>
          <line class="comp" x1="42" y1="6" x2="42" y2="34"/><line class="comp" x1="54" y1="6" x2="54" y2="34"/>
          <path class="comp" d="M68 34 L92 6 M92 34 L68 6" id="pCellRet"/>
          <rect id="pCursor" class="spool-cursor" x="32" y="-4" width="32" height="48" rx="3"/>
          <text x="48" y="56" text-anchor="middle" class="svgtag">5/3 DCV</text>
        </g>
        <!-- flow control -->
        <g transform="translate(252,176)">
          <rect class="comp" x="0" y="0" width="46" height="28" rx="4"/>
          <path class="comp" d="M7 22 L39 8 m-6 -2 l6 2 l-2 6"/>
          <path class="comp" d="M23 0 v-7 m-6 0 h12"/>
          <path class="comp" d="M14 14 l6 -5 l6 5" opacity=".7"/>
          <text x="23" y="40" text-anchor="middle" class="svgtag">FLOW CTRL</text>
          <text x="6" y="-10" class="svgtag" style="fill:var(--gold)">metered ⟶</text>
        </g>
        <!-- cylinder -->
        <g transform="translate(232,242)">
          <rect class="comp" x="0" y="0" width="100" height="30"/>
          <rect id="pPiston" x="4" y="3" width="10" height="24" fill="var(--pneu)" opacity=".75"/>
          <rect id="pRod" x="14" y="10" width="30" height="10" fill="var(--dim)"/>
          <text x="50" y="44" text-anchor="middle" class="svgtag">LARGE BORE CYLINDER</text>
        </g>
        <!-- exhausts -->
        <g transform="translate(132,250)"><path class="comp" d="M0 0 h10 l-5 9z"/><text x="5" y="22" text-anchor="middle" class="svgtag">EA</text></g>
        <g transform="translate(172,250)"><path class="comp" d="M0 0 h10 l-5 9z"/><text x="5" y="22" text-anchor="middle" class="svgtag">EB</text></g>
      </svg>
      <div class="readout"><span id="pExtTime">extension time: —</span><span id="pNote"></span></div>
      <div class="ctrls">
        <button id="pShut" class="ctl">Shutoff: CLOSED</button>
        <label class="slider">Regulator <input id="pReg" type="range" min="0" max="60" value="0"><b id="pRegV">0 psi</b></label>
        <label class="slider">Flow-control <input id="pFc" type="range" min="0" max="3" step="0.5" value="0"><b id="pFcV">closed</b></label>
        <div class="seg" id="pSeg">
          <button data-p="1" style="color:var(--elec)">▶ Extend</button>
          <button data-p="0" class="on">■ Center</button>
          <button data-p="-1" style="color:var(--hyd)">◀ Retract</button>
        </div>
        <button id="pClear" class="ctl" hidden>🗑 Clear hoses</button>
      </div>
    </div>`;
    const svg=root.querySelector('#psvg');
    const PORTS=[
      {id:'SUP',  x:32, y:118, label:'OUT', color:'var(--gold)', ly:-12},
      {id:'SH.i', x:60, y:118, label:'IN'}, {id:'SH.o', x:102, y:118, label:'OUT'},
      {id:'RG.i', x:124,y:118, label:'IN'}, {id:'RG.o', x:170, y:118, label:'OUT', color:'var(--gold)'},
      {id:'D.P',  x:168,y:172, label:'P', color:'var(--gold)'},
      {id:'D.A',  x:130,y:172, label:'A', color:'var(--pneu)'},
      {id:'D.B',  x:206,y:172, label:'B', color:'var(--pneu)', lx:8},
      {id:'D.EA', x:137,y:246, label:''},
      {id:'D.EB', x:177,y:246, label:''},
      {id:'F.v',  x:248,y:190, label:'V', lx:-4},
      {id:'F.c',  x:302,y:190, label:'C', color:'var(--pneu)', lx:6, max:2},
      {id:'C.cap',x:236,y:236, label:'CAP', lx:-14, ly:4},
      {id:'C.rod',x:328,y:236, label:'ROD', color:'var(--pneu)', lx:12, ly:4, max:2},
      {id:'GB.p', x:310,y:88,  label:'', max:1},
    ];
    const CORRECT=[['SUP','SH.i'],['SH.o','RG.i'],['RG.o','D.P'],['D.A','C.cap'],['D.B','F.v'],['F.c','C.rod'],['GB.p','C.rod']];
    const ST={mode:'guided',shut:false,reg:0,fc:0,dcv:0,pos:0,gB:0,extStart:null,extDone:false,retracted:false,builtOK:false};
    const note=root.querySelector('#pNote'), status=root.querySelector('#pStatus');
    let EV={capFed:false,exhaust:'none',gaugeRod:false,supplyOK:false,fcvCorrect:true,issues:[]};
    const kit=PortKit(svg,PORTS,{onChange:()=>evaluate()});
    kit.flash=m=>note.textContent=m;
    kit.set(CORRECT); kit.lock(true);
    root.querySelectorAll('#pMode button').forEach(b=>b.onclick=()=>{
      root.querySelectorAll('#pMode button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
      ST.mode=b.dataset.m;
      root.querySelector('#pClear').hidden=ST.mode!=='build';
      if(ST.mode==='build'){kit.lock(false);kit.clear();status.textContent='Connect: supply → shutoff → regulator → DCV P · DCV A → cap end · DCV B → flow control → rod end · Gauge B tees on the rod line.';}
      else{kit.set(CORRECT);kit.lock(true);status.textContent='';}
      evaluate();
    });
    root.querySelector('#pClear').onclick=()=>kit.clear();
    root.querySelector('#pShut').onclick=e=>{ST.shut=!ST.shut;e.target.textContent='Shutoff: '+(ST.shut?'OPEN':'CLOSED');e.target.classList.toggle('on',ST.shut);};
    root.querySelector('#pReg').oninput=e=>{ST.reg=+e.target.value;root.querySelector('#pRegV').textContent=ST.reg+' psi';};
    root.querySelector('#pFc').oninput=e=>{ST.fc=+e.target.value;root.querySelector('#pFcV').textContent=ST.fc===0?'closed':ST.fc+' turn';};
    root.querySelectorAll('#pSeg button').forEach(b=>b.onclick=()=>{
      root.querySelectorAll('#pSeg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
      ST.dcv=+b.dataset.p; if(ST.dcv===1){ST.extStart=performance.now();ST.extDone=false;}
      svg.querySelector('#pCursor').setAttribute('x',ST.dcv===1?0:ST.dcv===0?32:64);
    });

    /* circuit evaluation */
    function internalEdges(){
      const e=[];
      if(ST.shut) e.push(['SH.i','SH.o']);
      e.push(['RG.i','RG.o']);
      if(ST.dcv===1){ e.push(['D.P','D.A'],['D.B','D.EB']); }
      if(ST.dcv===-1){ e.push(['D.P','D.B'],['D.A','D.EA']); }
      e.push(['F.v','F.c']);
      return e;
    }
    function evaluate(){
      const issues=[];
      // which FCV port faces the cylinder rod? (BFS from C.rod without FCV internal edge)
      const rodSide=kit.reach(['C.rod'],[]);
      const cylOnC=rodSide.has('F.c'), cylOnV=rodSide.has('F.v');
      EV.fcvCorrect=cylOnC&&!cylOnV;
      if(cylOnV&&!cylOnC) issues.push('Flow-control is reversed — its check valve now bypasses EXTENSION.');
      // supply chain
      const supplyNet=kit.reach(['SUP'],ST.shut?[['SH.i','SH.o'],['RG.i','RG.o']]:[['RG.i','RG.o']]);
      EV.supplyOK=supplyNet.has('D.P');
      if(!kit.same('SUP','SH.i')) issues.push('Supply isn\u2019t connected to the shutoff valve.');
      else if(!supplyNet.has('RG.o')&&ST.shut) issues.push('Air stops at the regulator — check shutoff→regulator hose.');
      else if(!EV.supplyOK&&ST.shut) issues.push('Regulated air never reaches DCV port P.');
      if(!kit.same('D.A','C.cap')&&!(kit.same('D.B','C.cap'))) issues.push('Cap end of the cylinder isn\u2019t fed by the DCV.');
      const rodToB = rodSide.has('F.c')||rodSide.has('F.v') ? kit.reach(['C.rod'],[['F.v','F.c']]).has('D.B') : kit.same('C.rod','D.B');
      if(!rodToB) issues.push('Rod end has no path back to DCV port B — exhaust air is trapped or open.');
      EV.gaugeRod=kit.same('GB.p','C.rod');
      if(!EV.gaugeRod&&kit.deg('GB.p')===0) issues.push('Gauge B isn\u2019t tee\u2019d into the rod line — you\u2019ll have no back-pressure reading.');
      EV.issues=issues;
      if(status&&ST.mode==='build'){
        if(!issues.length&&kit.deg('SUP')>0){ status.innerHTML='<b style="color:var(--elec)">✓ Circuit matches the lab schematic.</b> Pressurize and run your tests.';
          if(!ST.builtOK){ST.builtOK=true;api.award('pneu_build',25,'Built the pneumatic circuit correctly');} }
        else if(kit.deg('SUP')===0&&issues.length) status.textContent='Connect: supply → shutoff → regulator → DCV P · DCV A → cap end · DCV B → flow control → rod end · Gauge B on the rod line.';
        else status.innerHTML=issues.map(i=>'✗ '+i).join('<br>');
      }
    }
    evaluate();

    let raf,last=performance.now();
    function tick(now){
      const dt=Math.min(.05,(now-last)/1000); last=now;
      const edges=internalEdges();
      const press=kit.reach(['SUP'],edges);
      const supply=(ST.shut&&press.has('RG.o'))?ST.reg:0;
      const capFed=ST.shut&&press.has('C.cap')&&supply>4;
      const rodFed=ST.shut&&press.has('C.rod')&&supply>4&&ST.dcv===-1;
      // exhaust path from rod when extending
      const exh=kit.reach(['C.rod'],edges);
      const rodExhaustOK=ST.dcv===1&&exh.has('D.EB');
      let v=0;
      if(capFed&&ST.dcv===1){
        if(!rodExhaustOK) v=0;
        else if(EV.fcvCorrect) v=ST.fc===0?0:(0.08+0.16*ST.fc)*(supply/30);
        else v=0.8*(supply/30); // reversed: check bypasses — uncontrolled
      }
      if(rodFed&&ST.dcv===-1){
        const capExh=kit.reach(['C.cap'],edges).has('D.EA');
        if(capExh) v=EV.fcvCorrect?-0.85*(supply/30):-(ST.fc===0?0:(0.07+0.14*ST.fc))*(supply/30);
      }
      ST.pos=Math.max(0,Math.min(1,ST.pos+v*dt));

          <text x="0" y="42" class="svgtag" style="fill:var(--acdc)">CYL 2</text>
          <rect class="comp" x="36" y="30" width="86" height="20"/><rect id="cy2p" x="40" y="32" width="7" height="16" fill="var(--acdc)" opacity=".8"/><rect id="cy2r" x="47" y="37" width="20" height="6" fill="var(--dim)"/>
          <rect id="ls2flag" x="124" y="1" width="6" height="18" rx="2" fill="var(--line)"/>
          <rect id="ls4flag" x="124" y="31" width="6" height="18" rx="2" fill="var(--line)"/>
          <text x="134" y="14" class="svgtag">2LS</text><text x="134" y="44" class="svgtag">4LS</text>
        </g>
        <g id="timerArcG" transform="translate(314,142)">
          <circle r="14" fill="none" stroke="var(--line)" stroke-width="3.5"/>
          <circle id="timerArc" r="14" fill="none" stroke="var(--elec)" stroke-width="3.5" stroke-dasharray="88" stroke-dashoffset="88" transform="rotate(-90)"/>
          <text text-anchor="middle" y="4" class="svgtag" id="timerTxt">1TR</text>
        </g>
      </svg>
      <div class="readout"><span id="rstate" style="color:var(--dim)">Idle — press START</span></div>
      <div class="ctrls">
        <button id="bSTOP" class="ctl danger">⊘ STOP 1PB (hold)</button>
        <button id="bSTART" class="ctl go">▶ START 2PB (hold)</button>
      </div>
      </div>
    </div>`;
    const svg=root.querySelector('svg');
    /* ---- wire-it placement game ---- */
    const SLOTS=[
      {id:'s1',rung:'Rung 1',hint:'1st — must kill everything',correct:'stop'},
      {id:'s2',rung:'Rung 1',hint:'starts the cycle (∥ with s3)',correct:'start'},
      {id:'s3',rung:'Rung 1',hint:'parallel branch around s2',correct:'seal'},
      {id:'s4',rung:'Rung 1',hint:'series end-of-sequence switch',correct:'ls'},
      {id:'s5',rung:'Rung 1',hint:'the load of this rung',correct:'cr'},
      {id:'s6',rung:'Rung 2',hint:'contact that follows rung 1\u2019s relay',correct:'crb'},
      {id:'s7',rung:'Rung 2',hint:'loads: extend Cyl 1 + start timing',correct:'sol1tr'},
      {id:'s8',rung:'Rung 3',hint:'contact that waits 1 second',correct:'tra'},
      {id:'s9',rung:'Rung 3',hint:'the load: extend Cyl 2',correct:'sol2'},
    ];
    const PARTS={stop:'STOP 1PB (NC)',start:'START 2PB (NO)',seal:'1CRA seal-in',ls:'2LS/4LS (NC)',cr:'1CR coil',crb:'1CRB contact',sol1tr:'1-SOL ∥ 1TR',tra:'1TRA timed (NO)',sol2:'2-SOL'};
    const CONSEQ={
      s1:'No NC STOP at the head of rung 1 — the circuit can run but can NEVER be stopped safely. Fails dangerous.',
      s2:'Nothing momentary to start the cycle — or worse, it self-starts on power-up.',
      s3:'No seal-in around START — the relay drops the instant you release the button (jog behavior).',
      s4:'No NC limit switch in series — the sequence never ends; cylinders stay out until STOP.',
      s5:'Rung 1 has no relay coil — closing the contacts does nothing anywhere else.',
      s6:'Rung 2 isn\u2019t commanded by 1CR — Cylinder 1 never follows the start logic.',
      s7:'Without 1-SOL ∥ 1TR here, Cylinder 1 won\u2019t extend and the timer never starts.',
      s8:'Without the TIMED contact 1TRA, Cylinder 2 fires instantly with Cylinder 1 — no 1 s delay.',
      s9:'Rung 3 has no 2-SOL — Cylinder 2 never extends.',
    };
    let placed={}, pickedPart=null, wired=false;
    const wirePanel=root.querySelector('#wirePanel'), runPanel=root.querySelector('#runPanel');
    function renderWire(){
      const used=new Set(Object.values(placed));
      const pool=Object.entries(PARTS).filter(([k])=>!used.has(k))
        .map(([k,v])=>`<button class="chip partchip ${pickedPart===k?'on':''}" data-part="${k}">${v}</button>`).join('');
      let lastRung='';
      const slots=SLOTS.map(s=>{
        const head=s.rung!==lastRung?`<div class="eyebrow" style="margin:10px 0 4px">${s.rung}</div>`:''; lastRung=s.rung;
        const p=placed[s.id];
        return head+`<button class="slotbtn ${p?(p===s.correct?'ok':'bad'):''}" data-slot="${s.id}">
          ${p?PARTS[p]:'<span class="sub">'+s.hint+'</span>'}</button>`;
      }).join('');
      const wrong=SLOTS.filter(s=>placed[s.id]&&placed[s.id]!==s.correct);
      const empty=SLOTS.filter(s=>!placed[s.id]);
      let verdict='';
      if(!empty.length&&!wrong.length){ verdict='<div class="buildstatus"><b style="color:var(--elec)">✓ Wired exactly like the lab ladder.</b> Switch to Full sequence and run it.</div>';
        if(!wired){wired=true;api.award('relay_wire',20,'Wired the 90-EC1A ladder correctly');} }
      else if(wrong.length) verdict='<div class="buildstatus">'+wrong.map(s=>'✗ <b>'+s.rung+'</b>: '+CONSEQ[s.id]).join('<br>')+'</div>';
      wirePanel.innerHTML=`<p class="sub" style="margin:4px 0 8px">Tap a device, then tap its slot. Tap a filled slot to clear it. Wrong placement = wrong machine behavior.</p>
        <div class="chips" style="flex-wrap:wrap">${pool||'<span class="sub">All devices placed.</span>'}</div>${slots}${verdict}`;
      wirePanel.querySelectorAll('.partchip').forEach(c=>c.onclick=()=>{pickedPart=pickedPart===c.dataset.part?null:c.dataset.part;renderWire();});
      wirePanel.querySelectorAll('.slotbtn').forEach(b=>b.onclick=()=>{
        const id=b.dataset.slot;
        if(placed[id]){delete placed[id];}
        else if(pickedPart){placed[id]=pickedPart;pickedPart=null;}
        renderWire();
      });
    }
    /* ---- animated run modes ---- */
    const ST={mode:'wire',stop:false,start:false,cr:false,tr:false,trT:0,tra:false,c1:0,c2:0,didSeq:false,didStop:false};
    const setMode=m=>{ST.mode=m;ST.cr=ST.tr=ST.tra=false;ST.trT=0;
      wirePanel.hidden=m!=='wire'; runPanel.hidden=m==='wire';
      if(m==='wire'){renderWire();return;}
      svg.getElementById('bSeal').style.opacity=m==='jog'?.2:1;
      ['c2LS','c4LS'].forEach(i=>svg.getElementById(i).style.opacity=m==='full'?1:.2);
      ['r3','c1TRA','coil2SOL','b1TR'].forEach(i=>svg.getElementById(i).style.opacity=m==='full'?1:.2);
      svg.getElementById('timerArcG').style.opacity=m==='full'?1:.2;};
    root.querySelectorAll('#mode button').forEach(b=>b.onclick=()=>{root.querySelectorAll('#mode button').forEach(x=>x.classList.remove('on'));b.classList.add('on');setMode(b.dataset.m);});
    setMode('wire');
    holdable(root.querySelector('#bSTOP'),()=>ST.stop=true,()=>ST.stop=false);
    holdable(root.querySelector('#bSTART'),()=>ST.start=true,()=>ST.start=false);
    let raf,last=performance.now(); const stTxt=root.querySelector('#rstate');
    function tick(now){
      const dt=Math.min(.05,(now-last)/1000); last=now;
      if(ST.mode!=='wire'){
        const ls2=ST.c1>=0.98, ls4=ST.c2>=0.98;
        const lsOK=ST.mode!=='full'||!(ls2&&ls4);
        ST.cr=!ST.stop&&(ST.mode==='jog'?ST.start:(ST.start||ST.cr))&&lsOK;
        if(ST.mode==='full'&&ST.cr){ST.tr=true;ST.trT=Math.min(1,ST.trT+dt);}else{ST.tr=false;ST.trT=0;}
        ST.tra=ST.mode==='full'&&ST.tr&&ST.trT>=1;
        ST.c1=Math.max(0,Math.min(1,ST.c1+(ST.cr?.55:-.7)*dt));
        ST.c2=Math.max(0,Math.min(1,ST.c2+(ST.tra?.55:-.7)*dt));
        const C=(id,on)=>{const e=svg.getElementById(id);if(e)e.classList.toggle('closed',on);};
        C('cSTOP',!ST.stop);C('cSTART',ST.start);C('cSEAL',ST.cr&&ST.mode!=='jog');
        C('c2LS',!ls2);C('c4LS',!ls4);C('c1CRB',ST.cr);C('c1TRA',ST.tra);
        const E=(id,on)=>{const e=svg.getElementById(id);if(e)e.classList.toggle('energized',on);};
        E('r1',ST.cr);E('coil1CR',ST.cr);E('r2',ST.cr);E('coil1SOL',ST.cr);E('coil1TR',ST.tr);E('r3',ST.tra);E('coil2SOL',ST.tra);E('sealwire',ST.cr&&ST.mode!=='jog');E('trwire',ST.tr);
        svg.getElementById('timerArc').setAttribute('stroke-dashoffset',88*(1-ST.trT));
        svg.getElementById('timerTxt').textContent=ST.tr?(ST.trT>=1?'✓':(1-ST.trT).toFixed(1)+'s'):'1TR';
        svg.getElementById('cy1p').setAttribute('x',40+ST.c1*74);svg.getElementById('cy1r').setAttribute('x',47+ST.c1*74);
        svg.getElementById('cy2p').setAttribute('x',40+ST.c2*74);svg.getElementById('cy2r').setAttribute('x',47+ST.c2*74);
        svg.getElementById('ls2flag').setAttribute('fill',ls2?'var(--elec)':'var(--line)');
        svg.getElementById('ls4flag').setAttribute('fill',ls4?'var(--acdc)':'var(--line)');
        stTxt.textContent=ST.stop?'STOP held — NC contact opened rung 1, everything de-energized.'
          :!ST.cr&&(ST.c1>0||ST.c2>0)?'De-energized — both cylinders retracting together.'
          :ST.cr&&!ST.tra?`1CR sealed ✓ · Cyl 1 extending · 1TR: ${ST.trT.toFixed(1)}s…`
          :ST.tra?'1TRA closed → 2-SOL · Cyl 2 extending.'
          :ST.mode==='jog'?'Jog: runs only while START is held (no memory).'
          :'Idle — press START.';
        if(ST.mode==='full'&&ls2&&ls4&&!ST.didSeq){ST.didSeq=true;api.award('relay_seq',20,'Completed the full timed sequence');}
        if(ST.stop&&(ST.c1>0.2||ST.c2>0.2)&&!ST.didStop){ST.didStop=true;api.award('relay_stop',10,'Verified STOP mid-cycle');}
      }
      raf=requestAnimationFrame(tick);
    }
    raf=requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(raf);
  }
};

    const CORRECT=[['SRC.1','S1.a'],['S1.b','F1.a'],['F1.b','XF.h1'],['XF.h2','SRC.2'],

          +row('1 · Primary H1–H2',primaryOK?'24.1 VAC':'0 VAC')

          +row(`7/10 · Lamp V (${viaCap?'CAP':'BYPASS'})`,on?lV.toFixed(1)+' VAC':'—',on)
          +row(`8/11 · A–A current`,on?A.toFixed(2)+' A':'—',on)
          +row('9/12 · P = V × I',on?(lV*A).toFixed(1)+' W':'—',on)
          +row('13 · Brightness',on?(viaCap?'DIM — Xc drops part of the 24 V':'FULL — lamp across the whole secondary'):'off');
      }else{
        if(ST.s1)mp.innerHTML=`<div class="warnrow">⚠ Open S1 first — resistance checks need power OFF.</div>`;
        else if(!ST.discharged){mp.innerHTML=`<div class="warnrow">⚠ C1 holds charge — readings erratic. Discharge first (sheet safety note).</div>`;root.querySelector('#adisch').hidden=false;}
        else{mp.innerHTML=row('3 · F1 continuity',ST.fuseOK?'~0.3 Ω ✓':'OL — open (blown)')+row('4 · Primary winding','6.8 Ω')+row('5 · Secondary winding','7.1 Ω')+row('6 · Lamp (cold)','11.6 Ω')
          +`<div class="okrow">Cold filament ≪ hot V/I (≈24 Ω) — resistance climbs with temperature.</div>`;
          api.award('acdc_ohm',15,'De-energized resistance checks done safely');}
      }
      raf=requestAnimationFrame(tick);
    }
    raf=requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(raf);
  }
};

          <button id="pbStep" class="ctl" hidden>⏭ Step one scan</button>
        </div>
      </div>
    </div>`;
    const svg=root.querySelector('svg');
    const SLOTS=[
      {id:'s1',rung:'Rung 1',hint:'kills everything (NC)',correct:'stop'},
      {id:'s2',rung:'Rung 1',hint:'starts the Run bit (NO)',correct:'start'},
      {id:'s3',rung:'Rung 1',hint:'seal-in around START',correct:'seal'},
      {id:'s4',rung:'Rung 1',hint:'series end-of-sequence inputs',correct:'ls'},
      {id:'s5',rung:'Rung 1',hint:'the load of this rung',correct:'run'},
      {id:'s6',rung:'Rung 2',hint:'contact that follows the Run bit',correct:'runb'},
      {id:'s7',rung:'Rung 2',hint:'loads: output + start the timer',correct:'sol1ton'},
      {id:'s8',rung:'Rung 3',hint:'contact that waits for the timer',correct:'tondn'},
      {id:'s9',rung:'Rung 3',hint:'rung 3 load',correct:'sol2'},
    ];
    const PARTS={stop:'I:1/0 STOP (NC)',start:'I:1/1 START (NO)',seal:'Run seal-in (NO)',ls:'I:1/2,3 LIMITS (NC)',run:'Run (B3:0/0) coil',runb:'Run contact',sol1ton:'O:2/0 ∥ T4:0 TON 1.0s',tondn:'T4:0.DN (NO)',sol2:'O:2/1'};
    const CONSEQ={
      s1:'No NC STOP at the head of rung 1 — the program can run but can NEVER be stopped safely. Fails dangerous.',
      s2:'Nothing momentary to start the Run bit — or it self-starts the moment the PLC powers up.',
      s3:'No seal-in around START — Run drops the very next scan after you release the input (jog behavior, not memory).',
      s4:'No NC limit inputs in series — the sequence never ends; both outputs stay on until STOP.',
      s5:'Rung 1 has no Run coil — closing the contacts does nothing anywhere else in the program.',
      s6:'Rung 2 isn’t driven by Run — Output 0 never follows the start logic.',
      s7:'Without O:2/0 ∥ T4:0 here, Cylinder 1 won’t extend and the timer never starts counting.',
      s8:'Without the TIMED contact T4:0.DN, Output 1 fires instantly with Output 0 — no 1.0s delay.',
      s9:'Rung 3 has no O:2/1 — Cylinder 2 never extends no matter what the timer does.',
    };
    let placed={}, pickedPart=null, wired=false;
    const wirePanel=root.querySelector('#pWire'), runPanel=root.querySelector('#pRun');
    function renderWire(){
      const used=new Set(Object.values(placed));
      const pool=Object.entries(PARTS).filter(([k])=>!used.has(k))
        .map(([k,v])=>`<button class="chip partchip ${pickedPart===k?'on':''}" data-part="${k}">${v}</button>`).join('');
      let lastRung='';
      const slots=SLOTS.map(s=>{
        const head=s.rung!==lastRung?`<div class="eyebrow" style="margin:10px 0 4px">${s.rung}</div>`:''; lastRung=s.rung;
        const p=placed[s.id];
        return head+`<button class="slotbtn ${p?(p===s.correct?'ok':'bad'):''}" data-slot="${s.id}">
          ${p?PARTS[p]:'<span class="sub">'+s.hint+'</span>'}</button>`;
      }).join('');
      const wrong=SLOTS.filter(s=>placed[s.id]&&placed[s.id]!==s.correct);
      const empty=SLOTS.filter(s=>!placed[s.id]);
      let verdict='';
      if(!empty.length&&!wrong.length){ verdict='<div class="buildstatus"><b style="color:var(--plc)">✓ Addressed and wired like the lab ladder.</b> Switch to Step scan or Auto-scan to run it.</div>';
        if(!wired){wired=true;api.award('plc_wire',20,'Addressed and wired the PLC ladder correctly');} }
      else if(wrong.length) verdict='<div class="buildstatus">'+wrong.map(s=>'✗ <b>'+s.rung+'</b>: '+CONSEQ[s.id]).join('<br>')+'</div>';
      wirePanel.innerHTML=`<p class="sub" style="margin:4px 0 8px">Tap a device, then tap its slot. Tap a filled slot to clear it. Wrong placement = wrong program behavior.</p>
        <div class="chips" style="flex-wrap:wrap">${pool||'<span class="sub">All devices placed.</span>'}</div>${slots}${verdict}`;
      wirePanel.querySelectorAll('.partchip').forEach(c=>c.onclick=()=>{pickedPart=pickedPart===c.dataset.part?null:c.dataset.part;renderWire();});
      wirePanel.querySelectorAll('.slotbtn').forEach(b=>b.onclick=()=>{
        const id=b.dataset.slot;
        if(placed[id]){delete placed[id];}
        else if(pickedPart){placed[id]=pickedPart;pickedPart=null;}
        renderWire();
      });
    }
    const ST={mode:'wire',stop:false,start:false,run:false,ton:false,tonT:0,dn:false,c1:0,c2:0,scan:0,didSeq:false,didStop:false,didStep:false};
    const setMode=m=>{ST.mode=m;
      wirePanel.hidden=m!=='wire'; runPanel.hidden=m==='wire';
      root.querySelector('#pbStep').hidden=m!=='step';
      if(m==='wire'){renderWire();return;}
    };
    root.querySelectorAll('#pMode button').forEach(b=>b.onclick=()=>{root.querySelectorAll('#pMode button').forEach(x=>x.classList.remove('on'));b.classList.add('on');setMode(b.dataset.m);});
    setMode('wire');
    holdable(root.querySelector('#pbSTOP'),()=>ST.stop=true,()=>ST.stop=false);
    holdable(root.querySelector('#pbSTART'),()=>ST.start=true,()=>ST.start=false);
    const stTxt=root.querySelector('#prstate');
    function paint(){
      const C=(id,on)=>{const e=svg.getElementById(id);if(e)e.classList.toggle('closed',on);};
      C('pcSTOP',!ST.stop);C('pcSTART',ST.start);C('pcSEAL',ST.run);C('pcLS',!(ST.c1>=0.98&&ST.c2>=0.98));C('pcRunB',ST.run);C('pcDN',ST.dn);
      const E=(id,on)=>{const e=svg.getElementById(id);if(e)e.classList.toggle('energized',on);};
      E('pr1',ST.run);E('pcoilRun',ST.run);E('pr2',ST.run);E('pcoilO0',ST.run);E('pcoilTON',ST.ton);E('pr3',ST.dn);E('pcoilO1',ST.dn);E('psealwire',ST.run);E('ptonwire',ST.ton);
      svg.getElementById('ptimerArc').setAttribute('stroke-dashoffset',88*(1-ST.tonT));
      svg.getElementById('ptimerTxt').textContent=ST.ton?(ST.tonT>=1?'✓':(1-ST.tonT).toFixed(1)+'s'):'T4:0';
      svg.getElementById('pcy1p').setAttribute('x',40+ST.c1*74);svg.getElementById('pcy1r').setAttribute('x',47+ST.c1*74);
      svg.getElementById('pcy2p').setAttribute('x',40+ST.c2*74);svg.getElementById('pcy2r').setAttribute('x',47+ST.c2*74);
      svg.getElementById('pscanTxt').textContent='scan '+ST.scan;
      stTxt.textContent=ST.stop?'STOP input true — rung 1 opens, Run drops, both outputs de-energize next scan.'
        :ST.run&&!ST.dn?`Run ✓ (B3:0/0) · O:2/0 on · T4:0 timing: ${ST.tonT.toFixed(1)}s of 1.0s…`
        :ST.dn?'T4:0.DN true → O:2/1 on. Sequence complete.'
        :'Idle — hold START, then advance the scan.';
    }
    function runScan(dt){
      ST.scan++;
      const ls2=ST.c1>=0.98, ls4=ST.c2>=0.98;
      const lsOK=!(ls2&&ls4);
      ST.run=!ST.stop&&(ST.start||ST.run)&&lsOK;
      if(ST.run){ST.ton=true;ST.tonT=Math.min(1,ST.tonT+dt);}else{ST.ton=false;ST.tonT=0;}
      ST.dn=ST.ton&&ST.tonT>=1;
      ST.c1=Math.max(0,Math.min(1,ST.c1+(ST.run?.35:-.45)*dt*4));
      ST.c2=Math.max(0,Math.min(1,ST.c2+(ST.dn?.35:-.45)*dt*4));
      const dot=svg.getElementById('pscanDot'); if(dot){dot.setAttribute('fill','var(--plc)');setTimeout(()=>dot.setAttribute('fill','var(--line)'),120);}
      paint();
      if(ls2&&ls4&&!ST.didSeq){ST.didSeq=true;api.award('plc_seq',20,'Ran the full scan-by-scan sequence to completion');}
      if(ST.stop&&(ST.c1>0.2||ST.c2>0.2)&&!ST.didStop){ST.didStop=true;api.award('plc_stop',10,'Verified STOP drops the Run bit mid-sequence');}
      if(ST.mode==='step'&&!ST.didStep){ST.didStep=true;api.award('plc_step',15,'Stepped the scan cycle by hand: read → solve → write');}
    }
    root.querySelector('#pbStep').onclick=()=>runScan(0.2);
    let raf,last=performance.now();
    function tick(now){
      const dt=Math.min(.05,(now-last)/1000); last=now;
      if(ST.mode==='auto'){ST._acc=(ST._acc||0)+dt; if(ST._acc>=0.35){ST._acc=0;runScan(0.35);} }
      raf=requestAnimationFrame(tick);
    }
    raf=requestAnimationFrame(tick);
    paint();
    return ()=>cancelAnimationFrame(raf);
  }
};

    const svg=root.querySelector('svg');

    function evalLoop(){
      const pct=ST.press||0;
      const mA=ST.broken?0:4+(pct/100)*16;
      const psi=ST.broken?0:(mA-4)/16*150;
      ST.seenSpan.add(Math.round(pct/25)*25);
      if(ST.seenSpan.size>=5&&!ST.seenAllSpan){ST.seenAllSpan=true;api.award('sens_span',15,'Walked the loop across its full 0–100% span');}

        +`<div class="okrow">psi = (mA − 4) / 16 × 150</div>`;
    }

};
